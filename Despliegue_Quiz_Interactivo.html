<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despliegue de Aplicaciones Web 🚀 — Quiz Interactivo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
  .screen{display:none;max-width:760px;margin:0 auto;padding:24px 16px}
  .screen.active{display:block}
  h1{font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
  .subtitle{color:#666;margin-bottom:24px;font-size:.95rem}
  .card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
  .card h2{font-size:1.05rem;font-weight:600;margin-bottom:16px;color:#1a1a2e}
  .sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:4px}
  .source-cb{display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.88rem;user-select:none}
  .source-cb:hover{border-color:#6c63ff;background:#f5f3ff}
  .source-cb input{accent-color:#6c63ff;width:16px;height:16px;cursor:pointer}
  .source-cb.checked{border-color:#6c63ff;background:#f0eeff}
  .mode-btns{display:flex;gap:10px;flex-wrap:wrap}
  .mode-btn{flex:1;min-width:120px;padding:12px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:.9rem;font-weight:500;transition:all .2s;text-align:center}
  .mode-btn.selected,.mode-btn:hover{border-color:#6c63ff;background:#f0eeff;color:#6c63ff}
  .btn{display:inline-block;padding:13px 32px;background:#6c63ff;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;text-align:center}
  .btn:hover{background:#5a52d5}
  .btn.secondary{background:#f0eeff;color:#6c63ff}
  .btn.secondary:hover{background:#e0d8ff}
  .btn.danger{background:#ff6b6b}
  .btn.danger:hover{background:#e55}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:10px 16px;font-size:.85rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  .stat strong{display:block;font-size:1.2rem;color:#6c63ff}
  .progress-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin-bottom:24px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6c63ff,#a78bfa);border-radius:99px;transition:width .4s}
  .question-num{font-size:.85rem;color:#888;margin-bottom:8px}
  .question-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:20px;color:#1a1a2e}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .option{padding:13px 18px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.4}
  .option:hover:not(.disabled){border-color:#6c63ff;background:#f5f3ff}
  .option.selected{border-color:#6c63ff;background:#f0eeff}
  .option.correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
  .option.show-correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.disabled{cursor:default}
  .feedback{padding:12px 16px;border-radius:10px;font-size:.9rem;font-weight:600;margin-bottom:16px;display:none}
  .feedback.correct{background:#f0fdf4;color:#166534;border:1px solid #86efac;display:block}
  .feedback.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;display:block}
  .quiz-actions{display:flex;gap:10px;flex-wrap:wrap}
  .source-tag{display:inline-block;font-size:.75rem;color:#888;background:#f5f5f5;padding:3px 10px;border-radius:99px;margin-bottom:12px}
  .score-wrap{text-align:center;padding:20px 0}
  .score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;font-weight:800;border:8px solid}
  .score-circle.great{border-color:#22c55e;color:#22c55e;background:#f0fdf4}
  .score-circle.good{border-color:#f59e0b;color:#f59e0b;background:#fffbeb}
  .score-circle.bad{border-color:#ef4444;color:#ef4444;background:#fef2f2}
  .score-label{font-size:1.1rem;font-weight:600;margin-bottom:8px}
  .score-sub{color:#888;font-size:.9rem;margin-bottom:24px}
  .result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
  .review-toggle{text-align:center;margin-bottom:12px}
  .review-list{display:none}
  .review-list.open{display:block}
  .review-item{padding:14px;border-radius:10px;margin-bottom:10px;font-size:.9rem}
  .review-item.ok{background:#f0fdf4;border:1px solid #86efac}
  .review-item.fail{background:#fef2f2;border:1px solid #fca5a5}
  .review-item .rq{font-weight:600;margin-bottom:6px}
  .review-item .ra{color:#166534}.review-item .rw{color:#991b1b;text-decoration:line-through;font-size:.85rem}
  .select-all-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .small-btn{padding:6px 14px;font-size:.8rem;border:1.5px solid #6c63ff;border-radius:8px;background:#fff;color:#6c63ff;cursor:pointer}
  .small-btn:hover{background:#f0eeff}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <h1>📚 Despliegue de Aplicaciones Web 🚀</h1>
  <p class="subtitle">194 preguntas · Quiz interactivo</p>

  <div class="card">
    <h2>Fuentes</h2>
    <div class="select-all-row">
      <button class="small-btn" onclick="toggleAll(true)">Marcar todas</button>
      <button class="small-btn" onclick="toggleAll(false)">Desmarcar todas</button>
    </div>
    <div class="sources-grid" id="sourcesGrid"></div>
  </div>

  <div class="card">
    <h2>Modo</h2>
    <div class="mode-btns">
      <div class="mode-btn selected" data-mode="all" onclick="selectMode(this)">Todas las preguntas</div>
      <div class="mode-btn" data-mode="40" onclick="selectMode(this)">40 aleatorias</div>
      <div class="mode-btn" data-mode="20" onclick="selectMode(this)">20 aleatorias</div>
    </div>
  </div>

  <button class="btn" onclick="startQuiz()" style="width:100%">Empezar test →</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">
  <div class="stats-bar">
    <div class="stat"><strong id="statCurrent">1</strong>Pregunta</div>
    <div class="stat"><strong id="statTotal">0</strong>Total</div>
    <div class="stat"><strong id="statCorrect" style="color:#22c55e">0</strong>Correctas</div>
    <div class="stat"><strong id="statWrong" style="color:#ef4444">0</strong>Falladas</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="card">
    <div class="question-num" id="questionNum"></div>
    <div class="source-tag" id="sourceTag"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsDiv"></div>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-actions">
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Siguiente →</button>
      <button class="btn secondary" onclick="skipQuestion()">Saltar</button>
      <button class="btn danger" style="margin-left:auto" onclick="if(confirm('¿Abandonar el test?'))showStart()">✕</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="screen">
  <h1>Resultados</h1>
  <div class="card">
    <div class="score-wrap">
      <div class="score-circle" id="scoreCircle"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-sub" id="scoreSub"></div>
    </div>
    <div class="result-actions">
      <button class="btn secondary" onclick="retryWrong()">🔁 Repetir falladas</button>
      <button class="btn secondary" onclick="startQuiz()">🔀 Repetir mismo test</button>
      <button class="btn secondary" onclick="showStart()">⚙️ Nueva config</button>
    </div>
    <div class="review-toggle">
      <button class="small-btn" onclick="toggleReview()">Ver/ocultar respuestas</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"q": "¿Qué es la World Wide Web?", "a": "Una red de equipos interconectada", "options": ["Un navegador web", "Una red de equipos interconectada", "Un tipo de servidor web", "Ninguna de las anteriores es correcta."], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "¿Qué nuevo protocolo permitió la expansión de los servicios web?:", "a": "HTTP", "options": ["DNS", "FTP", "HTTP", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "¿Qué puerto utiliza el protocolo HTTP?", "a": "80 TCP", "options": ["80 TCP", "80 UDP", "8080 TCP", "Ninguna de las anteriores"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "Cuando el servidor web ha terminado de enviar los datos al cliente…", "a": "Se cierra la conexión", "options": ["El servidor se reinicia", "Se cierra la conexión", "El navegador web se bloquea", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "HTML es…", "a": "Un lenguaje de marcas de hipertexto  basado en etiquetas utilizado para crear páginas web", "options": ["Un servidor de aplicaciones web", "Un lenguaje de marcas de hipertexto  basado en etiquetas utilizado para crear páginas web", "Un protocolo de red", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "El fundador del consorcio de la WWW (3WC) fue…", "a": "Tim Berners-Lee", "options": ["Bill Gates", "Richard Stallman", "Tim Berners-Lee", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "¿Qué ventajas aportan las aplicaciones web respecto a las aplicaciones de escritorio?", "a": "Compatibilidad con cualquier sistema operativo", "options": ["No necesitan acceso a internet", "Compatibilidad con cualquier sistema operativo", "La instalación en el ordenador ocupa menos espacio", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "El modelo P2P…", "a": "Funciona con una topología en malla y todos los nodos hacen de cliente y servidor", "options": ["Es un modelo centralizado", "Falla si uno de los nodos se cae", "Es el más utilizado en la actualidad", "Funciona con una topología en malla y todos los nodos hacen de cliente y servidor"], "correct": 3, "source": "Cuestionario. Tema 1"}, {"q": "En el modelo cliente-servidor…", "a": "Si hay un alto número de peticiones simultaneas se podría congestionar el servidor y dejar de estar operativo", "options": ["Si el servidor se cae los recursos siguen estando disponibles", "Si hay un alto número de peticiones simultaneas se podría congestionar el servidor y dejar de estar operativo", "El mantenimiento es más complicado que en el modelo P2P", "Todas son correctas"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "El modelo de tres capas…", "a": "El servidor web se comunicará con la base de datos", "options": ["Los clientes se comunican directamente con la BBDD", "El servidor web se comunicará con la base de datos", "Es necesario tener tantos servidores web como bases de datos.", "Ninguna es correcta"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "Mysql es…", "a": "Un sistema gestor de base de datos", "options": ["Un sistema gestor de base de datos", "Un navegador web", "Un tipo de servidor web", "Ninguna de las anteriores es correcta."], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "Los servidores web multiplataforma…", "a": "Se pueden instalar tanto en Windows como Linux", "options": ["Solo permiten su instalación el Linux", "Solo permiten su instalación en Windows", "Se pueden instalar tanto en Windows como Linux", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "Nginx Plus es…", "a": "Es la versión comercial de Nginx", "options": ["Un servidor web open soure", "Es la versión comercial de Nginx", "Una utilidad de Linux", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "IIS son las siglas de…", "a": "Internet Information Services", "options": ["Internet Information System", "Internet Information Services", "Internet Information Server", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes rutas está la carpeta raíz del servidor php?", "a": "C:\\wamp\\www", "options": ["C:\\wamp\\www\\php", "C:\\mp\\www", "C:\\wamp\\www", "C:\\wamp\\php"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "De los siguientes servidores web, ¿Cuál apareció primero?", "a": "Apache", "options": ["Apache", "Microsoft IIS", "Ngixn", "Ninguna de las opciones anteriores es correcta"], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "¿En qué ruta se establece el directorio raiz de un servidor web en Linux?", "a": "/var/www/html", "options": ["/var/www/html", "C:\\Windows\\System32\\websrv", "/var/www/inetpub", "Ninguna de las anteriores"], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "Para comprobar la configuración de Nginx utilizamos el comando…", "a": "Nginx -t", "options": ["Nginx --configtest", "Nginx -c", "Nginx --configcheck", "Nginx -t"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "Docker es…", "a": "Un sistema de despliegue de aplicaciones web y servicios basado en contenedores.", "options": ["Un sistema de despliegue de aplicaciones web y servicios basado en contenedores.", "Un servidor web de última generación", "Un complemento de Apache que actúa como firewall.", "Todas son correctas"], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "Un servidor Docker puede tener varios contenedores en el mismo puerto…", "a": "No, cada contenedor se debe redirigir un puerto único", "options": ["En un servidor docker solo se puede tener un contenedor.", "Si, se pueden tener varios sitios web apuntando al mismo puerto", "No, cada contenedor se debe redirigir un puerto único", "Ninguna es correcta"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "En Ubuntu, los ficheros de configuración se almacenan en la ruta:", "a": "/etc/", "options": ["/var/www", "/etc/", "/usr/", "/root/"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "El fichero de configuración de php se llama:", "a": "php.ini", "options": ["my.cfg", "php.cfg", "php.ini", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "Apache organiza los sitios web en sistema llamado:", "a": "VirtualHost", "options": ["ApacheHosts", "VirtualHost", "vSites", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "En Apache y Nginx los sitios web activados se guardan en…", "a": "La carpeta sites-enabled", "options": ["La carpeta sites-availables", "La carpeta conf-enabled", "La carpeta sites-enabled", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "En servidores Apache y Nginx, el archivo de logs que almacena las conexiones al servidor se llama …", "a": "Access.log", "options": ["Error.log", "Access.log", "Connections.log", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "Para que un certificado digital sea válido, …", "a": "Debe estar firmado por una CA", "options": ["Debe estar firmado por una CA", "Cualquier certificado autofirmado será válido", "Es necesario crearlo con OpenSSL.", "Ninguna de las anteriores"], "correct": 0, "source": "Cuestionario. Tema 3"}, {"q": "SSL es…", "a": "el protocolo que se utiliza para cifrar el protocolo HTTPS.", "options": ["Un protocolo de transferencia de imágenes", "el protocolo que se utiliza para cifrar el protocolo HTTPS.", "el protocolo de transferencia de datos en la red.", "el nombre de un módulo del servidor web."], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "HTTPS…", "a": "Utiliza el puerto TCP 443 para establecer conexiones seguras", "options": ["Utiliza el puerto TCP 433 para establecer conexiones seguras", "Utiliza el puerto UDP 443 para establecer conexiones seguras", "Utiliza el puerto TCP 443 para establecer conexiones seguras", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "Los módulos de PHP…", "a": "Añaden funcionalidades extras al servidor.", "options": ["Añaden funcionalidades extras al servidor.", "Permiten alojar más sitios web en un mismo servidor", "Permiten limitar el acceso al servidor bloqueando direcciones IP", "Los criterios elevados de seguridad."], "correct": 0, "source": "Cuestionario. Tema 3"}, {"q": "El comando AB permite…", "a": "Hacer pruebas de rendimiento en un servidor web", "options": ["Hacer pruebas de rendimiento en un servidor web", "Compilar código PHP de manera sencilla", "Verificar la configuración de Apache antes de aplicar cambios", "Ninguna de las anteriores"], "correct": 0, "source": "Cuestionario. Tema 3"}, {"q": "Los host virtuales nos permiten…", "a": "Alojar diferentes sitios webs en un mismo servidor", "options": ["Mejorar el rendimiento de PHP", "Alojar diferentes sitios webs en un mismo servidor", "Gestionar bases de datos MySQL", "Ninguna de las anteriores es correcta."], "correct": 1, "source": "Cuestionario. Tema 4"}, {"q": "Decimos que hacemos hosting cuando…", "a": "Cuando un mismo servidor web aloja múltiples sitios webs", "options": ["Cuando vendemos servicios de microinformatica", "Cuando realizamos balanceo de carga entre dos servidores", "Cuando un mismo servidor web aloja múltiples sitios webs", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 4"}, {"q": "Para hacer multisite en un servidor web basado por nombre necesitaremos...:", "a": "Una única IP pública.", "options": ["Tantas direcciones IP como sitios queramos publicar", "Ninguna IP pública", "Una única IP pública.", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 4"}, {"q": "cPanel es:", "a": "Un software para gestionar servidores webs", "options": ["Un software para gestionar máquinas virtuales", "Un software para gestionar servidores web olicy"], "correct": 1, "source": "Repaso 2ª Evaluación"}];
const SOURCES = ["Cuestionario. Tema 1", "Cuestionario. Tema 2", "Cuestionario. Tema 3", "Cuestionario. Tema 4", "Cuestionario. Tema 5", "Cuestionario. Tema 6", "Cuestionario. Tema 7", "Cuestionario. Tema 8", "Cuestionario. Tema 9", "Cuestionario. Tema 10", "Cuestionario. Tema 11", "Cuestionario. Tema 12", "Cuestionario. Tema 13", "Cuestionario. Tema 14", "Cuestionario. Tema 15", "Repaso 1ª Evaluación", "Repaso 2ª Evaluación"];

let sessionQs = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let wrongQs = [];
let selectedSources = new Set(SOURCES);
let mode = 'all';
let lastPool = [];

function buildSourcesGrid() {
  const grid = document.getElementById('sourcesGrid');
  grid.innerHTML = '';
  SOURCES.forEach(src => {
    const lbl = document.createElement('label');
    lbl.className = 'source-cb checked';
    lbl.innerHTML = `<input type="checkbox" checked onchange="toggleSource('${src}', this.checked)"> ${src}`;
    grid.appendChild(lbl);
  });
}

function toggleSource(src, checked) {
  if (checked) selectedSources.add(src); else selectedSources.delete(src);
  document.querySelectorAll('.source-cb').forEach(lbl => {
    const inp = lbl.querySelector('input');
    lbl.classList.toggle('checked', inp.checked);
  });
}

function toggleAll(state) {
  selectedSources = state ? new Set(SOURCES) : new Set();
  document.querySelectorAll('.source-cb input').forEach(inp => { inp.checked = state; inp.closest('.source-cb').classList.toggle('checked', state); });
}

function selectMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  mode = el.dataset.mode;
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz(pool) {
  if (!pool) {
    let filtered = ALL_QUESTIONS.filter(q => selectedSources.has(q.source));
    if (!filtered.length) { alert('Selecciona al menos una fuente'); return; }
    const n = parseInt(mode);
    if (!isNaN(n) && filtered.length > n) filtered = shuffle([...filtered]).slice(0, n);
    pool = filtered;
  }
  lastPool = pool;
  sessionQs = pool.map(q => {
    const paired = q.options.map((o,i) => ({text:o, isCorrect:i===q.correct}));
    const shuf = shuffle([...paired]);
    return {q:q.q, source:q.source, options:shuf.map(p=>p.text), correct:shuf.findIndex(p=>p.isCorrect), orig:q};
  });
  currentIdx = 0; correct = 0; wrong = 0; wrongQs = [];
  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  if (currentIdx >= sessionQs.length) { showResults(); return; }
  const q = sessionQs[currentIdx];
  answered = false;
  document.getElementById('questionNum').textContent = `Pregunta ${currentIdx+1} de ${sessionQs.length}`;
  document.getElementById('sourceTag').textContent = q.source;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('statCurrent').textContent = currentIdx+1;
  document.getElementById('statTotal').textContent = sessionQs.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('progressBar').style.width = (currentIdx/sessionQs.length*100)+'%';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;
  const div = document.getElementById('optionsDiv');
  div.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    div.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = sessionQs[currentIdx];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  const isCorrect = idx === q.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    opts[q.correct].classList.add('show-correct');
    wrong++;
    wrongQs.push(q.orig);
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').textContent = `✗ Incorrecto. Respuesta correcta: "${q.options[q.correct]}"`;
  } else {
    correct++;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').textContent = '✓ ¡Correcto!';
  }
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() { currentIdx++; renderQuestion(); }
function skipQuestion() { currentIdx++; renderQuestion(); }

function showResults() {
  show('resultsScreen');
  const total = sessionQs.length;
  const pct = Math.round(correct/total*100);
  const circle = document.getElementById('scoreCircle');
  circle.textContent = pct+'%';
  circle.className = 'score-circle ' + (pct>=80?'great':pct>=50?'good':'bad');
  document.getElementById('scoreLabel').textContent = pct>=80?'¡Excelente!':pct>=50?'Bien, sigue practicando':'Hay que repasar más';
  document.getElementById('scoreSub').textContent = `${correct} correctas / ${wrong} incorrectas / ${total-correct-wrong} sin responder · de ${total} preguntas`;
  const list = document.getElementById('reviewList');
  list.innerHTML = sessionQs.map((q,i) => {
    const userWrong = wrongQs.some(w => w.q===q.q);
    return `<div class="review-item ${userWrong?'fail':'ok'}">
      <div class="rq">${i+1}. ${q.q}</div>
      <div class="ra">✓ ${q.options[q.correct]}</div>
      ${userWrong?'<div class="rw">Tu respuesta fue incorrecta</div>':''}
    </div>`;
  }).join('');
}

function retryWrong() {
  if (!wrongQs.length) { alert('¡No tienes respuestas falladas!'); return; }
  startQuiz(wrongQs);
}

function toggleReview() {
  const list = document.getElementById('reviewList');
  list.classList.toggle('open');
}

function showStart() { show('startScreen'); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildSourcesGrid();
</script>
