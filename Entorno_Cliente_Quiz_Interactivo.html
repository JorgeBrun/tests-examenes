<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desarrollo Web Entorno Cliente 🌐 — Quiz Interactivo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
  .screen{display:none;max-width:760px;margin:0 auto;padding:24px 16px}
  .screen.active{display:block}
  h1{font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
  .subtitle{color:#666;margin-bottom:24px;font-size:.95rem}
  .card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
  .card h2{font-size:1.05rem;font-weight:600;margin-bottom:16px;color:#1a1a2e}
  .sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:4px}
  .source-cb{display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.88rem;user-select:none}
  .source-cb:hover{border-color:#6c63ff;background:#f5f3ff}
  .source-cb input{accent-color:#6c63ff;width:16px;height:16px;cursor:pointer}
  .source-cb.checked{border-color:#6c63ff;background:#f0eeff}
  .mode-btns{display:flex;gap:10px;flex-wrap:wrap}
  .mode-btn{flex:1;min-width:120px;padding:12px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:.9rem;font-weight:500;transition:all .2s;text-align:center}
  .mode-btn.selected,.mode-btn:hover{border-color:#6c63ff;background:#f0eeff;color:#6c63ff}
  .btn{display:inline-block;padding:13px 32px;background:#6c63ff;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;text-align:center}
  .btn:hover{background:#5a52d5}
  .btn.secondary{background:#f0eeff;color:#6c63ff}
  .btn.secondary:hover{background:#e0d8ff}
  .btn.danger{background:#ff6b6b}
  .btn.danger:hover{background:#e55}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:10px 16px;font-size:.85rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  .stat strong{display:block;font-size:1.2rem;color:#6c63ff}
  .progress-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin-bottom:24px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6c63ff,#a78bfa);border-radius:99px;transition:width .4s}
  .question-num{font-size:.85rem;color:#888;margin-bottom:8px}
  .question-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:20px;color:#1a1a2e}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .option{padding:13px 18px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.4}
  .option:hover:not(.disabled){border-color:#6c63ff;background:#f5f3ff}
  .option.selected{border-color:#6c63ff;background:#f0eeff}
  .option.correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
  .option.show-correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.disabled{cursor:default}
  .feedback{padding:12px 16px;border-radius:10px;font-size:.9rem;font-weight:600;margin-bottom:16px;display:none}
  .feedback.correct{background:#f0fdf4;color:#166534;border:1px solid #86efac;display:block}
  .feedback.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;display:block}
  .quiz-actions{display:flex;gap:10px;flex-wrap:wrap}
  .source-tag{display:inline-block;font-size:.75rem;color:#888;background:#f5f5f5;padding:3px 10px;border-radius:99px;margin-bottom:12px}
  .score-wrap{text-align:center;padding:20px 0}
  .score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;font-weight:800;border:8px solid}
  .score-circle.great{border-color:#22c55e;color:#22c55e;background:#f0fdf4}
  .score-circle.good{border-color:#f59e0b;color:#f59e0b;background:#fffbeb}
  .score-circle.bad{border-color:#ef4444;color:#ef4444;background:#fef2f2}
  .score-label{font-size:1.1rem;font-weight:600;margin-bottom:8px}
  .score-sub{color:#888;font-size:.9rem;margin-bottom:24px}
  .result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
  .review-toggle{text-align:center;margin-bottom:12px}
  .review-list{display:none}
  .review-list.open{display:block}
  .review-item{padding:14px;border-radius:10px;margin-bottom:10px;font-size:.9rem}
  .review-item.ok{background:#f0fdf4;border:1px solid #86efac}
  .review-item.fail{background:#fef2f2;border:1px solid #fca5a5}
  .review-item .rq{font-weight:600;margin-bottom:6px}
  .review-item .ra{color:#166534}.review-item .rw{color:#991b1b;text-decoration:line-through;font-size:.85rem}
  .select-all-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .small-btn{padding:6px 14px;font-size:.8rem;border:1.5px solid #6c63ff;border-radius:8px;background:#fff;color:#6c63ff;cursor:pointer}
  .small-btn:hover{background:#f0eeff}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <h1>📚 Desarrollo Web Entorno Cliente 🌐</h1>
  <p class="subtitle">162 preguntas · Quiz interactivo</p>

  <div class="card">
    <h2>Fuentes</h2>
    <div class="select-all-row">
      <button class="small-btn" onclick="toggleAll(true)">Marcar todas</button>
      <button class="small-btn" onclick="toggleAll(false)">Desmarcar todas</button>
    </div>
    <div class="sources-grid" id="sourcesGrid"></div>
  </div>

  <div class="card">
    <h2>Modo</h2>
    <div class="mode-btns">
      <div class="mode-btn selected" data-mode="all" onclick="selectMode(this)">Todas las preguntas</div>
      <div class="mode-btn" data-mode="40" onclick="selectMode(this)">40 aleatorias</div>
      <div class="mode-btn" data-mode="20" onclick="selectMode(this)">20 aleatorias</div>
    </div>
  </div>

  <button class="btn" onclick="startQuiz()" style="width:100%">Empezar test →</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">
  <div class="stats-bar">
    <div class="stat"><strong id="statCurrent">1</strong>Pregunta</div>
    <div class="stat"><strong id="statTotal">0</strong>Total</div>
    <div class="stat"><strong id="statCorrect" style="color:#22c55e">0</strong>Correctas</div>
    <div class="stat"><strong id="statWrong" style="color:#ef4444">0</strong>Falladas</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="card">
    <div class="question-num" id="questionNum"></div>
    <div class="source-tag" id="sourceTag"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsDiv"></div>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-actions">
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Siguiente →</button>
      <button class="btn secondary" onclick="skipQuestion()">Saltar</button>
      <button class="btn danger" style="margin-left:auto" onclick="if(confirm('¿Abandonar el test?'))showStart()">✕</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="screen">
  <h1>Resultados</h1>
  <div class="card">
    <div class="score-wrap">
      <div class="score-circle" id="scoreCircle"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-sub" id="scoreSub"></div>
    </div>
    <div class="result-actions">
      <button class="btn secondary" onclick="retryWrong()">🔁 Repetir falladas</button>
      <button class="btn secondary" onclick="startQuiz()">🔀 Repetir mismo test</button>
      <button class="btn secondary" onclick="showStart()">⚙️ Nueva config</button>
    </div>
    <div class="review-toggle">
      <button class="small-btn" onclick="toggleReview()">Ver/ocultar respuestas</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"q": "El protocolo HTTP…", "a": "Forma parte del nivel de aplicación", "options": ["Forma parte del nivel de red", "Forma parte del nivel de aplicación", "Es más seguro que SSL.", "Ninguna de las anteriores es correcta"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "En la arquitectura cliente/servidor…", "a": "Puede requerir máquinas con altas especificaciones hardware", "options": ["Solo se puede utilizar una capa", "La capa de datos debe estar ligada a la de procesamiento", "Puede requerir máquinas con altas especificaciones hardware", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Una URL…", "a": "Permite definir una dirección de una página web", "options": ["Permite definir una dirección de una página web", "Identifica a un recurso web inequívocamente", "No se puede utilizar con HTTP", "Solo está permitida en SSH"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "La arquitectura cliente/servidor…", "a": "Se centra en el envío de peticiones del cliente", "options": ["Permite que el servidor envíe peticiones al cliente", "Se basa en la resolución de peticiones en el cliente", "Se centra en el envío de peticiones del cliente", "No se puede utilizar en contextos web"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Al utilizar HTTPS…", "a": "Se introduce una capa de seguridad adicional a HTTP", "options": ["Se introduce una capa de seguridad adicional a HTTP", "Se utiliza una pila de protocolos totalmente diferente a HTTP", "Nos apoyamos en SSH", "Ninguna de las anteriores es correcta"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "En una arquitectura cliente/servidor…", "a": "El front-end se refiere al cliente", "options": ["El front-end se refiere al servidor", "El front-end se refiere al cliente", "El back-end se refiere al cliente", "El cliente realiza tareas pesadas"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "Una URI…", "a": "Identifica a un recurso en la red sin ninguna duda", "options": ["Es una URL resumida", "Permite indicar una dirección web", "Identifica a un recurso en la red sin ninguna duda", "Se utiliza solamente en SSH"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Al realizar una petición GET…", "a": "Ninguna de las anteriores es correcta", "options": ["Nos referimos al protocolo FTP", "Hablamos del protocolo SSH", "Se refiere a la utilización de URIs", "Ninguna de las anteriores es correcta"], "correct": 3, "source": "Cuestionario. Tema 1"}, {"q": "El nivel de red…", "a": "Incluye el protocolo IP", "options": ["Se encarga de la comunicación entre el emisor y receptor", "Se apoya en el nivel de transporte", "Incluye el protocolo IP", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "SSH se utiliza…", "a": "Para gestionar una máquina remota", "options": ["Especialmente para el intercambio de archivos", "Para conectar de forma segura a la web", "Para gestionar una máquina remota", "Para dar soporte a HTTPs"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Un documento HTML…", "a": "Puede combinar HTML con otros lenguajes", "options": ["Únicamente permite la utilización del lenguaje HTML", "Puede combinar HTML con otros lenguajes", "Permite la utilización de cualquier conjunto de etiquetas", "Ninguna de las anteriores es correcta"], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "El lenguaje HTML…", "a": "Tiene un conjunto de etiquetas cerrado", "options": ["No se puede visualizar en un navegador", "No es un lenguaje de marcado.", "Tiene un conjunto de etiquetas cerrado", "Con la evolución del lenguaje surge TypeScript"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "Un componente de los navegadores web es…", "a": "Gestor de almacenamiento", "options": ["La URL", "HTTP", "Gestor de almacenamiento", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "En el desarrollo web en cliente…", "a": "Ninguna de las anteriores correcta", "options": ["No se puede usar editores de texto", "No es posible utilizar IDEs", "Requerimos siempre conexión con la red", "Ninguna de las anteriores correcta"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "En el desarrollo web cliente…", "a": "Se puede utilizar HTML", "options": ["No se puede utilizar CSS", "Se puede utilizar Java", "Se puede utilizar HTML", "Todas las anteriores son correctas"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "En el desarrollo web…", "a": "JSON se utiliza para intercambiar datos", "options": ["HTML se utiliza para intercambio de datos", "XML se utiliza para representación visual", "JSON se utiliza para intercambiar datos", "JavaScript se utiliza para la apariencia visual"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "Un framework…", "a": "Facilita el desarrollo web en cliente", "options": ["No se puede utilizar el cliente", "Facilita el desarrollo web en cliente", "Es incompatible con JavaScript", "Es incompatible con JSON"], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "En HTML las etiquetas pueden ser…", "a": "Ninguna de las anteriores es correcta", "options": ["Modificadas", "Ampliadas", "Borradas", "Ninguna de las anteriores es correcta"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "En el desarrollo web, ¿qué opción es correcta referente al uso del lenguaje XML?", "a": "Posee un conjunto de tecnologías a su alrededor", "options": ["No permite el intercambio de datos", "Es muy limitado", "Posee un conjunto de tecnologías a su alrededor", "Ninguna de las anteriores es correcta"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "El lenguaje de programación JavaScript…", "a": "Se centra en temas de interacción", "options": ["Permite mejorar la apariencia de la web", "Se centra en temas de interacción", "Aumenta la seguridad de una web", "No se puede ejecutar fuera del contexto web"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "Para incluir código JavaScript en una web…", "a": "Todas las anteriores son correctas", "options": ["Podemos hacerlo directamente en el HTML", "Se puede utilizar a nivel de etiqueta", "Se puede utilizar un archivo externo", "Todas las anteriores son correctas"], "correct": 3, "source": "Cuestionario. Tema 3"}, {"q": "JavaScript es un lenguaje….", "a": "A y C son correctas.", "options": ["De programación", "De modelado", "De Scripting", "A y C son correctas."], "correct": 3, "source": "Cuestionario. Tema 3"}, {"q": "Al ejecutar código JavaScript…", "a": "Se realiza en el cliente.", "options": ["Se realiza siempre en el servidor.", "Se realiza en el cliente.", "No puede ser bloqueado.", "Siempre se requiere de un programa externo al navegador web."], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "En el lenguaje JavaScript…", "a": "La declaración de variables no requiere tipo", "options": ["Siempre hay que indicar el tipo de las variables en su declaración", "La declaración de variables no requiere tipo", "Las variables no se declaran", "No existen las variables"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "El operador de asignación…", "a": "Modifica la parte izquierda", "options": ["Modifica la parte derecha", "Modifica la parte izquierda", "Se comporta igual que la igualdad matemática", "No existe en JavaScript"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "La conversión del tipo de datos en JavaScript…", "a": "Puede requerir intervención del programador", "options": ["El siempre automática", "Puede requerir intervención del programador", "El siempre segura", "Ninguna de las anteriores correcta"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "Los comentarios en JavaScript….", "a": "Se permiten comentario de línea y de bloque", "options": ["No están permitidos", "Sólo se permiten en línea", "Se permiten comentario de línea y de bloque", "Hay que borrarlos cuando finaliza el desarrollo"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "En la declaración de la variable en JavaScript…", "a": "Se puede comenzar con un _", "options": ["Se puede comenzar con un número", "Se puede comenzar con un _", "Sólo se puede comenzar con letras en mayúsculas", "Ninguna es correcta."], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "En JavaScript las palabras reservadas…", "a": "Ninguna de las anteriores es correcta", "options": ["Puede ser utilizadas como identificadores", "Puede modificarse", "Se escriben en mayúsculas", "Ninguna de las anteriores es correcta"], "correct": 3, "source": "Cuestionario. Tema 4"}, {"q": "En JavaScript una palabra reservada es…", "a": "if...else", "options": ["FUNCTION", "For", "_switch", "if...else"], "correct": 3, "source": "Cuestionario. Tema 4"}, {"q": "En JavaScript, las sentencias escritas en la misma línea...", "a": "Se separan utilizando ;", "options": ["Se separan utilizando :", "Se separan utilizando ;", "No requiere separador", "Ninguna de las anteriores es correcta"], "correct": 1, "source": "Cuestionario. Tema 4"}, {"q": "Un bloque de código…", "a": "Sólo requiere un conjunto de sentencias", "options": ["Está formado por al menos una condición", "Está formado por al menos un bucle", "Sólo requiere un conjunto de sentencias", "JavaScript no permite bloques de código"], "correct": 2, "source": "Cuestionario. Tema 4"}, {"q": "Las cadenas de caracteres…", "a": "Se definen con comillas dobles o simples al inicio y al final.", "options": ["Siempre se definen con comillas dobles.", "Se definen con comillas dobles o simples al inicio y al final.", "No pueden tener caracteres especiales.", "Se definen con comillas simples al inicio y al final."], "correct": 1, "source": "Cuestionario. Tema 4"}, {"q": "En JavaScript, los operadores aritméticos…", "a": "Nos permiten realizar operaciones con números", "options": ["Siempre requieren el mismo tipo de datos", "Nos permiten realizar operaciones con números", "Sólo pueden t const SOURCES = ["Cuestionario. Tema 1", "Cuestionario. Tema 2", "Cuestionario. Tema 3", "Cuestionario. Tema 4", "Cuestionario. Tema 5", "Cuestionario. Tema 6", "Cuestionario. Tema 7", "Cuestionario. Tema 8", "Cuestionario. Tema 9", "Cuestionario. Tema 10", "Cuestionario. Tema 11", "Cuestionario. Tema 12", "Cuestionario. Tema 13", "Cuestionario. Tema 14", "Cuestionario. Tema 15", "Repaso 1ª Evaluación", "Repaso 2ª Evaluación"];

let sessionQs = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let wrongQs = [];
let selectedSources = new Set(SOURCES);
let mode = 'all';
let lastPool = [];

function buildSourcesGrid() {
  const grid = document.getElementById('sourcesGrid');
  grid.innerHTML = '';
  SOURCES.forEach(src => {
    const lbl = document.createElement('label');
    lbl.className = 'source-cb checked';
    lbl.innerHTML = `<input type="checkbox" checked onchange="toggleSource('${src}', this.checked)"> ${src}`;
    grid.appendChild(lbl);
  });
}

function toggleSource(src, checked) {
  if (checked) selectedSources.add(src); else selectedSources.delete(src);
  document.querySelectorAll('.source-cb').forEach(lbl => {
    const inp = lbl.querySelector('input');
    lbl.classList.toggle('checked', inp.checked);
  });
}

function toggleAll(state) {
  selectedSources = state ? new Set(SOURCES) : new Set();
  document.querySelectorAll('.source-cb input').forEach(inp => { inp.checked = state; inp.closest('.source-cb').classList.toggle('checked', state); });
}

function selectMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  mode = el.dataset.mode;
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz(pool) {
  if (!pool) {
    let filtered = ALL_QUESTIONS.filter(q => selectedSources.has(q.source));
    if (!filtered.length) { alert('Selecciona al menos una fuente'); return; }
    const n = parseInt(mode);
    if (!isNaN(n) && filtered.length > n) filtered = shuffle([...filtered]).slice(0, n);
    pool = filtered;
  }
  lastPool = pool;
  sessionQs = pool.map(q => {
    const paired = q.options.map((o,i) => ({text:o, isCorrect:i===q.correct}));
    const shuf = shuffle([...paired]);
    return {q:q.q, source:q.source, options:shuf.map(p=>p.text), correct:shuf.findIndex(p=>p.isCorrect), orig:q};
  });
  currentIdx = 0; correct = 0; wrong = 0; wrongQs = [];
  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  if (currentIdx >= sessionQs.length) { showResults(); return; }
  const q = sessionQs[currentIdx];
  answered = false;
  document.getElementById('questionNum').textContent = `Pregunta ${currentIdx+1} de ${sessionQs.length}`;
  document.getElementById('sourceTag').textContent = q.source;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('statCurrent').textContent = currentIdx+1;
  document.getElementById('statTotal').textContent = sessionQs.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('progressBar').style.width = (currentIdx/sessionQs.length*100)+'%';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;
  const div = document.getElementById('optionsDiv');
  div.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    div.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = sessionQs[currentIdx];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  const isCorrect = idx === q.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    opts[q.correct].classList.add('show-correct');
    wrong++;
    wrongQs.push(q.orig);
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').textContent = `✗ Incorrecto. Respuesta correcta: "${q.options[q.correct]}"`;
  } else {
    correct++;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').textContent = '✓ ¡Correcto!';
  }
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() { currentIdx++; renderQuestion(); }
function skipQuestion() { currentIdx++; renderQuestion(); }

function showResults() {
  show('resultsScreen');
  const total = sessionQs.length;
  const pct = Math.round(correct/total*100);
  const circle = document.getElementById('scoreCircle');
  circle.textContent = pct+'%';
  circle.className = 'score-circle ' + (pct>=80?'great':pct>=50?'good':'bad');
  document.getElementById('scoreLabel').textContent = pct>=80?'¡Excelente!':pct>=50?'Bien, sigue practicando':'Hay que repasar más';
  document.getElementById('scoreSub').textContent = `${correct} correctas / ${wrong} incorrectas / ${total-correct-wrong} sin responder · de ${total} preguntas`;
  const list = document.getElementById('reviewList');
  list.innerHTML = sessionQs.map((q,i) => {
    const userWrong = wrongQs.some(w => w.q===q.q);
    return `<div class="review-item ${userWrong?'fail':'ok'}">
      <div class="rq">${i+1}. ${q.q}</div>
      <div class="ra">✓ ${q.options[q.correct]}</div>
      ${userWrong?'<div class="rw">Tu respuesta fue incorrecta</div>':''}
    </div>`;
  }).join('');
}

function retryWrong() {
  if (!wrongQs.length) { alert('¡No tienes respuestas falladas!'); return; }
  startQuiz(wrongQs);
}

function toggleReview() {
  const list = document.getElementById('reviewList');
  list.classList.toggle('open');
}

function showStart() { show('startScreen'); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildSourcesGrid();
</script>
