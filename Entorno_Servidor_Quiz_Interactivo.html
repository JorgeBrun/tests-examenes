<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desarrollo Web Entorno Servidor 🖥 — Quiz Interactivo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
  .screen{display:none;max-width:760px;margin:0 auto;padding:24px 16px}
  .screen.active{display:block}
  h1{font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
  .subtitle{color:#666;margin-bottom:24px;font-size:.95rem}
  .card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
  .card h2{font-size:1.05rem;font-weight:600;margin-bottom:16px;color:#1a1a2e}
  .sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:4px}
  .source-cb{display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.88rem;user-select:none}
  .source-cb:hover{border-color:#6c63ff;background:#f5f3ff}
  .source-cb input{accent-color:#6c63ff;width:16px;height:16px;cursor:pointer}
  .source-cb.checked{border-color:#6c63ff;background:#f0eeff}
  .mode-btns{display:flex;gap:10px;flex-wrap:wrap}
  .mode-btn{flex:1;min-width:120px;padding:12px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:.9rem;font-weight:500;transition:all .2s;text-align:center}
  .mode-btn.selected,.mode-btn:hover{border-color:#6c63ff;background:#f0eeff;color:#6c63ff}
  .btn{display:inline-block;padding:13px 32px;background:#6c63ff;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;text-align:center}
  .btn:hover{background:#5a52d5}
  .btn.secondary{background:#f0eeff;color:#6c63ff}
  .btn.secondary:hover{background:#e0d8ff}
  .btn.danger{background:#ff6b6b}
  .btn.danger:hover{background:#e55}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:10px 16px;font-size:.85rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  .stat strong{display:block;font-size:1.2rem;color:#6c63ff}
  .progress-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin-bottom:24px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6c63ff,#a78bfa);border-radius:99px;transition:width .4s}
  .question-num{font-size:.85rem;color:#888;margin-bottom:8px}
  .question-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:20px;color:#1a1a2e}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .option{padding:13px 18px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.4}
  .option:hover:not(.disabled){border-color:#6c63ff;background:#f5f3ff}
  .option.selected{border-color:#6c63ff;background:#f0eeff}
  .option.correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
  .option.show-correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.disabled{cursor:default}
  .feedback{padding:12px 16px;border-radius:10px;font-size:.9rem;font-weight:600;margin-bottom:16px;display:none}
  .feedback.correct{background:#f0fdf4;color:#166534;border:1px solid #86efac;display:block}
  .feedback.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;display:block}
  .quiz-actions{display:flex;gap:10px;flex-wrap:wrap}
  .source-tag{display:inline-block;font-size:.75rem;color:#888;background:#f5f5f5;padding:3px 10px;border-radius:99px;margin-bottom:12px}
  .score-wrap{text-align:center;padding:20px 0}
  .score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;font-weight:800;border:8px solid}
  .score-circle.great{border-color:#22c55e;color:#22c55e;background:#f0fdf4}
  .score-circle.good{border-color:#f59e0b;color:#f59e0b;background:#fffbeb}
  .score-circle.bad{border-color:#ef4444;color:#ef4444;background:#fef2f2}
  .score-label{font-size:1.1rem;font-weight:600;margin-bottom:8px}
  .score-sub{color:#888;font-size:.9rem;margin-bottom:24px}
  .result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
  .review-toggle{text-align:center;margin-bottom:12px}
  .review-list{display:none}
  .review-list.open{display:block}
  .review-item{padding:14px;border-radius:10px;margin-bottom:10px;font-size:.9rem}
  .review-item.ok{background:#f0fdf4;border:1px solid #86efac}
  .review-item.fail{background:#fef2f2;border:1px solid #fca5a5}
  .review-item .rq{font-weight:600;margin-bottom:6px}
  .review-item .ra{color:#166534}.review-item .rw{color:#991b1b;text-decoration:line-through;font-size:.85rem}
  .select-all-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .small-btn{padding:6px 14px;font-size:.8rem;border:1.5px solid #6c63ff;border-radius:8px;background:#fff;color:#6c63ff;cursor:pointer}
  .small-btn:hover{background:#f0eeff}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <h1>📚 Desarrollo Web Entorno Servidor 🖥</h1>
  <p class="subtitle">174 preguntas · Quiz interactivo</p>

  <div class="card">
    <h2>Fuentes</h2>
    <div class="select-all-row">
      <button class="small-btn" onclick="toggleAll(true)">Marcar todas</button>
      <button class="small-btn" onclick="toggleAll(false)">Desmarcar todas</button>
    </div>
    <div class="sources-grid" id="sourcesGrid"></div>
  </div>

  <div class="card">
    <h2>Modo</h2>
    <div class="mode-btns">
      <div class="mode-btn selected" data-mode="all" onclick="selectMode(this)">Todas las preguntas</div>
      <div class="mode-btn" data-mode="40" onclick="selectMode(this)">40 aleatorias</div>
      <div class="mode-btn" data-mode="20" onclick="selectMode(this)">20 aleatorias</div>
    </div>
  </div>

  <button class="btn" onclick="startQuiz()" style="width:100%">Empezar test →</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">
  <div class="stats-bar">
    <div class="stat"><strong id="statCurrent">1</strong>Pregunta</div>
    <div class="stat"><strong id="statTotal">0</strong>Total</div>
    <div class="stat"><strong id="statCorrect" style="color:#22c55e">0</strong>Correctas</div>
    <div class="stat"><strong id="statWrong" style="color:#ef4444">0</strong>Falladas</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="card">
    <div class="question-num" id="questionNum"></div>
    <div class="source-tag" id="sourceTag"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsDiv"></div>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-actions">
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Siguiente →</button>
      <button class="btn secondary" onclick="skipQuestion()">Saltar</button>
      <button class="btn danger" style="margin-left:auto" onclick="if(confirm('¿Abandonar el test?'))showStart()">✕</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="screen">
  <h1>Resultados</h1>
  <div class="card">
    <div class="score-wrap">
      <div class="score-circle" id="scoreCircle"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-sub" id="scoreSub"></div>
    </div>
    <div class="result-actions">
      <button class="btn secondary" onclick="retryWrong()">🔁 Repetir falladas</button>
      <button class="btn secondary" onclick="startQuiz()">🔀 Repetir mismo test</button>
      <button class="btn secondary" onclick="showStart()">⚙️ Nueva config</button>
    </div>
    <div class="review-toggle">
      <button class="small-btn" onclick="toggleReview()">Ver/ocultar respuestas</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"q": "¿Qué acción es la primera en llevarse a cabo independientemente de si estamos en una página web estática o dinámica?", "a": "Se introduce una url en el navegador, del servicio o página que se desea visitar", "options": ["Se modela la petición HTTP que se envía al servidor", "El servidor realiza una búsqueda del recurso solicitado", "Se introduce una url en el navegador, del servicio o página que se desea visitar", "Se accede al cmd"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "¿Qué tipo de páginas muestran un contenido distinto en función de los valores de la petición?", "a": "Dinámicas", "options": ["Estáticas", "HTML", "Dinámicas", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "¿En cuál de las siguientes capas se ubica la funcionalidad de la aplicación?", "a": "Capa intermedia", "options": ["En ningún tipo de capa", "Capa o nivel de cliente", "Capa intermedia", "Capa de acceso a datos"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Los lenguajes scripting…", "a": "Permiten ser embebidos con el código HTML", "options": ["Permiten ser embebidos con el código HTML", "No existen", "Se utilizan para la programación orientada a objetos", "Permiten el desarrollo de interfaces en dispositivo Android"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "¿Qué verbos utiliza el método HTTP?", "a": "POST Y GET", "options": ["GET y SET", "POST Y GET", "GET", "POST"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "La arquitecta Node.js ¿qué lenguaje permite utilizar para el desarrollo del lado servidor?", "a": "JavaScript", "options": ["Java", "JavaScript", "PHP", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "¿Qué tecnología permite incorporar al desarrollo de JavaScript funcionalidades para la detección de errores antes de ser visualizado en el navegador?", "a": "TypeScript", "options": ["Node.js", "TypeScript", "XAMPP", "Text Wrangler"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "¿Cómo se puede instalar Typescript a través de línea de comandos?", "a": "Ninguna de las anteriores", "options": ["-g typescript", "npm --install", "npm --install -g typescript", "Ninguna de las anteriores"], "correct": 3, "source": "Cuestionario. Tema 1"}, {"q": "Selecciona la respuesta correcta sobre la implementación de una página básica utilizando php con XAMPP", "a": "Los ficheros .php se sitúan dentro de htdocs", "options": ["Los ficheros .php se sitúan dentro de htdocs", "Las etiquetas utilizadas para embeber el código php son ?php y php?", "PHP no es soportado como XAMPP", "Todas son incorrectas"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "¿ Qué tecnología permite el desarrollo de aplicaciones en el lado del servidor?", "a": "Node.js", "options": ["Esto es imposible", "NodeXAMPP", "Typescript", "Node.js"], "correct": 3, "source": "Cuestionario. Tema 1"}, {"q": "¿Cuáles de los siguientes lenguajes son claves para el desarrollo en entorno servidor?", "a": "B y C son correctas", "options": ["HTTP", "PHP", "JSP", "B y C son correctas"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué elemento permite tratar a los Servlet de forma dinámica, recibiendo peticiones de páginas web y redireccionándolas hacia el objeto Servlet encargado de su tratamiento?", "a": "Contenedores de servlets", "options": ["Contenedores estáticos", "Contenedores de elementos", "Contenedores de servlets", "Navegadores de servlets"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿En cuál de los siguientes tipos de lenguajes de marcado las etiquetas no son visibles para el usuario final del documento ni para el desarrollador del mismo?", "a": "Marcado de presentación", "options": ["Marcado de procedimiento", "Marcado descriptivo", "Marcado de presentación", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué marcas se utilizan para la inclusión de lenguaje php en un fichero de desarrollo de sitio web?", "a": "?php ?", "options": ["?php ?", "?php php", "% %", "No se utiliza ningún tipo de marcas"], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "¿En qué fichero se recogen las directivas de configuración de PHP?", "a": "php.ini", "options": ["phpinfo", "php.ini", "htdocs", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes sintaxis es incorrecta con respecto a la creación de variables en PHP?", "a": "$9var=‘Hola Mundo’;", "options": ["$var=‘Hola Mundo’;", "$_var=‘Hola Mundo’;", "$var9=‘Hola Mundo’;", "$9var=‘Hola Mundo’;"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes sintaxis es correcta con respecto a la creación de variables en PHP?", "a": "$var=‘Hola Mundo’;", "options": ["var=‘Hola Mundo’;", "$999=‘Hola Mundo’;", "$var9=‘Hola Mundo’", "$var=‘Hola Mundo’;"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué tipo de elemento se declara de la forma define (“PI”, 3.14)?", "a": "Constantes", "options": ["Estáticas", "Variables", "Constantes", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué tipo de datos permiten la creación de números decimales?", "a": "Float", "options": ["Float", "Integer", "Boolean", "Todas son incorrectas"], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes funciones permite convertir a cadena de texto cualquier variable que se le pasa por parámetro?", "a": "strval()", "options": ["Esto es imposible", "intval()", "floatval()", "strval()"], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué tipos de sentencias podemos diferenciar en el desarrollo con lenguajes de programación?", "a": "Todas son correctas", "options": ["Lineales", "Condicionales", "Bucles", "Todas son correctas"], "correct": 3, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué tipo de expresión sería la siguiente: $auxiliar1=$auxiliar2?", "a": "Expresión de asignación", "options": ["Comparativa", "Creación de objeto", "Expresión de asignación", "Bucle"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué tipo de elementos permiten modificar el flujo de ejecución de las instrucciones de un programa?", "a": "Estructuras de control", "options": ["Variables", "Estructuras de control", "Sentencias lineales", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué tipo de estructura de control se ejecuta de forma lineal de arriba hacia abajo, y cuando encuentra una condición que se cumple ejecuta las acciones codificadas en ese bloque?", "a": "Switch", "options": ["Switch", "While", "Do-while", "Foreach"], "correct": 0, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué tipo de sentencias son: for, while o foreach?", "a": "Bucle", "options": ["Lineales", "Bucle", "Estructura de control", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "¿Cuál de las siguientes opciones permiten recorrer todas las posiciones de un array?", "a": "Foreach", "options": ["If-else", "If", "Break", "Foreach"], "correct": 3, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué sentencia permite detener la ejecución del bucle o estructura de control dónde se encuentra implementado?", "a": "break;", "options": ["continue;", "break;", "sleep;", "stop;"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "¿Cuál de las siguientes sentencias para la creación de arrays es correcta?", "a": "$arrayNumeros = array ( 1, 2, 3);", "options": ["$arrayNumeros = array ( 1, 2, 3)", "$arrayNumeros = ( 1, 2, 3);", "$arrayNumeros = array ( 1, 2, 3);", "Ninguna de las anteriores"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "¿Cuál de las siguientes sentencias para el acceso a una posición de un array es correcta?", "a": "$nombreArray[posicion];", "options": ["$nombreArray[posicion];", "unset ($nombreArray);", "unset ($nombreArray[posición]);", "Todas son correctas"], "correct": 0, "source": "Cuestionario. Tema 3"}, {"q": "¿Cuál de los siguientes delimitadores permiten incluir comentarios en PHP?", "a": "Todas son correctas", "options": ["/* */", "//", "#", "Todas son correctas"], "correct": 3, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué función permite generar de forma automática la fecha o la hora actual?", "a": "date()", "options": ["rand()", "fecha()", "array()", "date()"], "correct": 3, "source": "Cuestionario. Tema 4"}, {"q": "¿Cuál de las siguientes opciones es incorrecta con respecto a la creación de una función?", "a": "Siempre utilizan un return para retornar un valor", "options": ["Pueden recibir parámetros de entrada", "Pueden no recibir parámetros de entrada", "Siempre utilizan un return para retornar un valor", "Pueden o no retornar un valor utilizando la palabra return"], "correct": 2, "source": "Cuestionario. Tema 4"}, {"q": "¿Cuál de las siguientes opciones es correcta con respecto a la creación de una función?", "a": "Suponen un fragmento de código reutilizable", "options": ["Las funciones que reciben parámetros de entrada siempre utilizan return para devolver un valor de salida", "Suponen un fragmento de código reutilizable", "Las funciones que reciben parámetros de entrada nunca utilizan return para devolver un valor de salida", "Ninguna de las anteriores"], "correct": 1, "source": "Cuestionario. Tema 4"}, {"q": "¿Cuál de las siguientes instrucciones es correcta con respecto a la llamada a una función desde un punto cualquiera del programa en PHP?", "a": "nombreFuncion(“Hola”);", "options": ["nombreFuncion(“Hola”);", "function nombreFuncion();", "nombreFunción()", "Todas son correctas"], "correct": 0, "source": "Cuestionario. Tema 4"}, {"q": "¿Qué palabra permite devolver un valor como salida de una función?", "a": "return", "options": ["function", "return", "divide", "exit"], "correct": 1, "source": "Cuestionario. Tema 4"}, {"q": "¿Qué método envía una petición HTTP de forma invisible al usuario?", "a": "POST const SOURCES = ["Cuestionario. Tema 1", "Cuestionario. Tema 2", "Cuestionario. Tema 3", "Cuestionario. Tema 4", "Cuestionario. Tema 5", "Cuestionario. Tema 6", "Cuestionario. Tema 7", "Cuestionario. Tema 8", "Cuestionario. Tema 9", "Cuestionario. Tema 10", "Cuestionario. Tema 11", "Cuestionario. Tema 12", "Cuestionario. Tema 13", "Cuestionario. Tema 14", "Cuestionario. Tema 15", "Repaso 1ª Evaluación", "Repaso 2ª Evaluación"];

let sessionQs = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let wrongQs = [];
let selectedSources = new Set(SOURCES);
let mode = 'all';
let lastPool = [];

function buildSourcesGrid() {
  const grid = document.getElementById('sourcesGrid');
  grid.innerHTML = '';
  SOURCES.forEach(src => {
    const lbl = document.createElement('label');
    lbl.className = 'source-cb checked';
    lbl.innerHTML = `<input type="checkbox" checked onchange="toggleSource('${src}', this.checked)"> ${src}`;
    grid.appendChild(lbl);
  });
}

function toggleSource(src, checked) {
  if (checked) selectedSources.add(src); else selectedSources.delete(src);
  document.querySelectorAll('.source-cb').forEach(lbl => {
    const inp = lbl.querySelector('input');
    lbl.classList.toggle('checked', inp.checked);
  });
}

function toggleAll(state) {
  selectedSources = state ? new Set(SOURCES) : new Set();
  document.querySelectorAll('.source-cb input').forEach(inp => { inp.checked = state; inp.closest('.source-cb').classList.toggle('checked', state); });
}

function selectMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  mode = el.dataset.mode;
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz(pool) {
  if (!pool) {
    let filtered = ALL_QUESTIONS.filter(q => selectedSources.has(q.source));
    if (!filtered.length) { alert('Selecciona al menos una fuente'); return; }
    const n = parseInt(mode);
    if (!isNaN(n) && filtered.length > n) filtered = shuffle([...filtered]).slice(0, n);
    pool = filtered;
  }
  lastPool = pool;
  sessionQs = pool.map(q => {
    const paired = q.options.map((o,i) => ({text:o, isCorrect:i===q.correct}));
    const shuf = shuffle([...paired]);
    return {q:q.q, source:q.source, options:shuf.map(p=>p.text), correct:shuf.findIndex(p=>p.isCorrect), orig:q};
  });
  currentIdx = 0; correct = 0; wrong = 0; wrongQs = [];
  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  if (currentIdx >= sessionQs.length) { showResults(); return; }
  const q = sessionQs[currentIdx];
  answered = false;
  document.getElementById('questionNum').textContent = `Pregunta ${currentIdx+1} de ${sessionQs.length}`;
  document.getElementById('sourceTag').textContent = q.source;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('statCurrent').textContent = currentIdx+1;
  document.getElementById('statTotal').textContent = sessionQs.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('progressBar').style.width = (currentIdx/sessionQs.length*100)+'%';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;
  const div = document.getElementById('optionsDiv');
  div.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    div.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = sessionQs[currentIdx];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  const isCorrect = idx === q.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    opts[q.correct].classList.add('show-correct');
    wrong++;
    wrongQs.push(q.orig);
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').textContent = `✗ Incorrecto. Respuesta correcta: "${q.options[q.correct]}"`;
  } else {
    correct++;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').textContent = '✓ ¡Correcto!';
  }
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() { currentIdx++; renderQuestion(); }
function skipQuestion() { currentIdx++; renderQuestion(); }

function showResults() {
  show('resultsScreen');
  const total = sessionQs.length;
  const pct = Math.round(correct/total*100);
  const circle = document.getElementById('scoreCircle');
  circle.textContent = pct+'%';
  circle.className = 'score-circle ' + (pct>=80?'great':pct>=50?'good':'bad');
  document.getElementById('scoreLabel').textContent = pct>=80?'¡Excelente!':pct>=50?'Bien, sigue practicando':'Hay que repasar más';
  document.getElementById('scoreSub').textContent = `${correct} correctas / ${wrong} incorrectas / ${total-correct-wrong} sin responder · de ${total} preguntas`;
  const list = document.getElementById('reviewList');
  list.innerHTML = sessionQs.map((q,i) => {
    const userWrong = wrongQs.some(w => w.q===q.q);
    return `<div class="review-item ${userWrong?'fail':'ok'}">
      <div class="rq">${i+1}. ${q.q}</div>
      <div class="ra">✓ ${q.options[q.correct]}</div>
      ${userWrong?'<div class="rw">Tu respuesta fue incorrecta</div>':''}
    </div>`;
  }).join('');
}

function retryWrong() {
  if (!wrongQs.length) { alert('¡No tienes respuestas falladas!'); return; }
  startQuiz(wrongQs);
}

function toggleReview() {
  const list = document.getElementById('reviewList');
  list.classList.toggle('open');
}

function showStart() { show('startScreen'); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildSourcesGrid();
</script>
