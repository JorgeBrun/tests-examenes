<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciberseguridad 🔐 — Quiz Interactivo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
  .screen{display:none;max-width:760px;margin:0 auto;padding:24px 16px}
  .screen.active{display:block}
  h1{font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
  .subtitle{color:#666;margin-bottom:24px;font-size:.95rem}
  .card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
  .card h2{font-size:1.05rem;font-weight:600;margin-bottom:16px;color:#1a1a2e}
  .sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:4px}
  .source-cb{display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.88rem;user-select:none}
  .source-cb:hover{border-color:#6c63ff;background:#f5f3ff}
  .source-cb input{accent-color:#6c63ff;width:16px;height:16px;cursor:pointer}
  .source-cb.checked{border-color:#6c63ff;background:#f0eeff}
  .mode-btns{display:flex;gap:10px;flex-wrap:wrap}
  .mode-btn{flex:1;min-width:120px;padding:12px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:.9rem;font-weight:500;transition:all .2s;text-align:center}
  .mode-btn.selected,.mode-btn:hover{border-color:#6c63ff;background:#f0eeff;color:#6c63ff}
  .btn{display:inline-block;padding:13px 32px;background:#6c63ff;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;text-align:center}
  .btn:hover{background:#5a52d5}
  .btn.secondary{background:#f0eeff;color:#6c63ff}
  .btn.secondary:hover{background:#e0d8ff}
  .btn.danger{background:#ff6b6b}
  .btn.danger:hover{background:#e55}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:10px 16px;font-size:.85rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  .stat strong{display:block;font-size:1.2rem;color:#6c63ff}
  .progress-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin-bottom:24px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6c63ff,#a78bfa);border-radius:99px;transition:width .4s}
  .question-num{font-size:.85rem;color:#888;margin-bottom:8px}
  .question-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:20px;color:#1a1a2e}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .option{padding:13px 18px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.4}
  .option:hover:not(.disabled){border-color:#6c63ff;background:#f5f3ff}
  .option.selected{border-color:#6c63ff;background:#f0eeff}
  .option.correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
  .option.show-correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
  .option.disabled{cursor:default}
  .feedback{padding:12px 16px;border-radius:10px;font-size:.9rem;font-weight:600;margin-bottom:16px;display:none}
  .feedback.correct{background:#f0fdf4;color:#166534;border:1px solid #86efac;display:block}
  .feedback.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;display:block}
  .quiz-actions{display:flex;gap:10px;flex-wrap:wrap}
  .source-tag{display:inline-block;font-size:.75rem;color:#888;background:#f5f5f5;padding:3px 10px;border-radius:99px;margin-bottom:12px}
  .score-wrap{text-align:center;padding:20px 0}
  .score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;font-weight:800;border:8px solid}
  .score-circle.great{border-color:#22c55e;color:#22c55e;background:#f0fdf4}
  .score-circle.good{border-color:#f59e0b;color:#f59e0b;background:#fffbeb}
  .score-circle.bad{border-color:#ef4444;color:#ef4444;background:#fef2f2}
  .score-label{font-size:1.1rem;font-weight:600;margin-bottom:8px}
  .score-sub{color:#888;font-size:.9rem;margin-bottom:24px}
  .result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
  .review-toggle{text-align:center;margin-bottom:12px}
  .review-list{display:none}
  .review-list.open{display:block}
  .review-item{padding:14px;border-radius:10px;margin-bottom:10px;font-size:.9rem}
  .review-item.ok{background:#f0fdf4;border:1px solid #86efac}
  .review-item.fail{background:#fef2f2;border:1px solid #fca5a5}
  .review-item .rq{font-weight:600;margin-bottom:6px}
  .review-item .ra{color:#166534}.review-item .rw{color:#991b1b;text-decoration:line-through;font-size:.85rem}
  .select-all-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .small-btn{padding:6px 14px;font-size:.8rem;border:1.5px solid #6c63ff;border-radius:8px;background:#fff;color:#6c63ff;cursor:pointer}
  .small-btn:hover{background:#f0eeff}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <h1>📚 Ciberseguridad 🔐</h1>
  <p class="subtitle">166 preguntas · Quiz interactivo</p>

  <div class="card">
    <h2>Fuentes</h2>
    <div class="select-all-row">
      <button class="small-btn" onclick="toggleAll(true)">Marcar todas</button>
      <button class="small-btn" onclick="toggleAll(false)">Desmarcar todas</button>
    </div>
    <div class="sources-grid" id="sourcesGrid"></div>
  </div>

  <div class="card">
    <h2>Modo</h2>
    <div class="mode-btns">
      <div class="mode-btn selected" data-mode="all" onclick="selectMode(this)">Todas las preguntas</div>
      <div class="mode-btn" data-mode="40" onclick="selectMode(this)">40 aleatorias</div>
      <div class="mode-btn" data-mode="20" onclick="selectMode(this)">20 aleatorias</div>
    </div>
  </div>

  <button class="btn" onclick="startQuiz()" style="width:100%">Empezar test →</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">
  <div class="stats-bar">
    <div class="stat"><strong id="statCurrent">1</strong>Pregunta</div>
    <div class="stat"><strong id="statTotal">0</strong>Total</div>
    <div class="stat"><strong id="statCorrect" style="color:#22c55e">0</strong>Correctas</div>
    <div class="stat"><strong id="statWrong" style="color:#ef4444">0</strong>Falladas</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="card">
    <div class="question-num" id="questionNum"></div>
    <div class="source-tag" id="sourceTag"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsDiv"></div>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-actions">
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Siguiente →</button>
      <button class="btn secondary" onclick="skipQuestion()">Saltar</button>
      <button class="btn danger" style="margin-left:auto" onclick="if(confirm('¿Abandonar el test?'))showStart()">✕</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="screen">
  <h1>Resultados</h1>
  <div class="card">
    <div class="score-wrap">
      <div class="score-circle" id="scoreCircle"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-sub" id="scoreSub"></div>
    </div>
    <div class="result-actions">
      <button class="btn secondary" onclick="retryWrong()">🔁 Repetir falladas</button>
      <button class="btn secondary" onclick="startQuiz()">🔀 Repetir mismo test</button>
      <button class="btn secondary" onclick="showStart()">⚙️ Nueva config</button>
    </div>
    <div class="review-toggle">
      <button class="small-btn" onclick="toggleReview()">Ver/ocultar respuestas</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"q": "¿Cuáles son los factores clave en la seguridad de la información?", "a": "Todas son correctas", "options": ["Confidencialidad", "Integridad", "Disponibilidad", "Todas son correctas"], "correct": 3, "source": "Cuestionario. Tema 1"}, {"q": "La probabilidad de que un sistema se comporte como se esperaba de él se denomina___________", "a": "Fiabilidad", "options": ["Confidencialidad", "Integridad", "Fiabilidad", "Disponibilidad"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "La propiedad de prevenir la divulgación de la información a personas o sistemas no autorizados se denomina___________", "a": "Confidencialidad", "options": ["Confidencialidad", "Integridad", "Fiabilidad", "Disponibilidad"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "La propiedad que busca mantener los datos libres de modificaciones no autorizadas se denomina___________", "a": "Integridad", "options": ["Confidencialidad", "Integridad", "Fiabilidad", "Disponibilidad"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "La característica, cualidad o condición de la información de encontrarse a disposición de quienes deben de acceder a ella se denomina___________", "a": "Disponibilidad", "options": ["Confidencialidad", "Integridad", "Fiabilidad", "Disponibilidad"], "correct": 3, "source": "Cuestionario. Tema 1"}, {"q": "El activo más crítico de una organización es…", "a": "Datos", "options": ["Hardware", "Software", "Datos", "Caja fuerte"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Programas que abren ventanas emergentes y muestran publicidad de productos y servicios:", "a": "Adware", "options": ["Sypware", "Adware", "Spam", "Phishing"], "correct": 1, "source": "Cuestionario. Tema 1"}, {"q": "Una advertencia o factor que causa un daño al sistema informático (hardware y software) y alteran la CIA (Confidencialidad, integridad y disponibilidad) se denomina ___________", "a": "Amenaza", "options": ["Riesgo", "Vulnerabilidad", "Amenaza", "Todas son correctas"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "Un simulador que simula diferentes tareas, pero en realidad es un atacante oculto para evitar ser descubierto se denomina ___________", "a": "Caballo de troya", "options": ["Caballo de troya", "Spyware", "Adware", "Bombas lógicas"], "correct": 0, "source": "Cuestionario. Tema 1"}, {"q": "Un método de conseguir de forma fraudulenta contraseñas de los usuarios cuando acceden a diferentes medios para suplantar la identidad es __________", "a": "Phishing", "options": ["Spam", "Spoofing", "Phishing", "Exploit"], "correct": 2, "source": "Cuestionario. Tema 1"}, {"q": "¿Cuál de las siguientes acciones es esencial para la seguridad física y ambiental de los sistemas informáticos?", "a": "Implementar medidas de protección física como cerraduras, cámaras de seguridad y sistemas de alarmas para restringir el acceso no autorizado.", "options": ["Utilizar solo software de antivirus actualizado.", "Implementar medidas de protección física como cerraduras, cámaras de seguridad y sistemas de alarmas para restringir el acceso no autorizado.", "Asegurar que solo el personal técnico tenga acceso remoto a los servidores.", "Garantizar que todos los empleados tengan acceso a los equipos de seguridad física sin restricciones."], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué se entiende por seguridad física en el contexto de la seguridad informática?", "a": "La protección de los sistemas y datos de amenazas ambientales y desastres naturales.", "options": ["La protección de los sistemas y datos de amenazas ambientales y desastres naturales.", "El control de acceso a los recursos y sistemas de una organización.", "El establecimiento de políticas y directrices de seguridad.", "La protección de los equipos y servidores mediante sistemas de vigilancia."], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes opciones NO es una medida de seguridad física para proteger los equipos y servidores?", "a": "Implementar firewalls y sistemas de detección de intrusiones.", "options": ["Ubicar los equipos en una sala de servidores con acceso restringido.", "Instalar sistemas de alimentación ininterrumpida (SAI).", "Implementar firewalls y sistemas de detección de intrusiones.", "Utilizar cerraduras y sistemas de vigilancia."], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué es un plan de recuperación en caso de desastres?", "a": "Un plan para recuperar la operatividad después de un desastre o interrupción.", "options": ["Un conjunto de medidas para proteger los equipos y servidores de amenazas físicas.", "Un protocolo de respuesta a incidentes de seguridad informática.", "Un plan para recuperar la operatividad después de un desastre o interrupción.", "Una política para prevenir y mitigar riesgos de seguridad."], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes opciones es una medida de seguridad pasiva en informática?", "a": "Implementar sistemas de detección de intrusiones.", "options": ["Actualizar regularmente el software y los sistemas.", "Implementar sistemas de detección de intrusiones.", "Utilizar cifrado para proteger la información sensible.", "Establecer políticas de seguridad y concientización para los empleados."], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué tipo de estándar de seguridad es el ISO/IEC 27001?", "a": "Estándar para la gestión de la seguridad de la información.", "options": ["Estándar para la gestión de la seguridad de la información.", "Estándar para la seguridad física en entornos de TI.", "Estándar para la evaluación de riesgos en redes de comunicación.", "Estándar para la protección de datos personales en la nube."], "correct": 0, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes opciones NO es una función de los Sistemas de Alimentación Ininterrumpida (SAI)?", "a": "Mantener la temperatura adecuada de los equipos y servidores.", "options": ["Proteger contra cortes de energía y pérdida de datos.", "Mantener la temperatura adecuada de los equipos y servidores.", "Proporcionar energía de respaldo durante interrupciones eléctricas.", "Permitir un apagado seguro y ordenado de los sistemas en caso de emergencia."], "correct": 1, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál de las siguientes opciones NO es una pauta de seguridad informática?", "a": "CIS Controls", "options": ["Evaluación de riesgos", "Diseño y arquitectura segura", "CIS Controls", "Políticas y procedimientos"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿Por qué es importante que toda la organización esté implicada en la adopción de pautas de seguridad informática?", "a": "Todas las anteriores.", "options": ["Para evitar amenazas externas y ataques cibernéticos.", "Para garantizar la confidencialidad y la integridad de la información.", "Para promover una cultura de seguridad y conciencia entre los empleados.", "Todas las anteriores."], "correct": 3, "source": "Cuestionario. Tema 2"}, {"q": "¿Cuál es el propósito principal de un plan de recuperación en caso de desastres (DRP)?", "a": "Identificar los impactos en el negocio", "options": ["Minimizar el riesgo de desastres naturales", "Establecer líneas de comunicación claras", "Identificar los impactos en el negocio", "Políticas y procedimientos"], "correct": 2, "source": "Cuestionario. Tema 2"}, {"q": "¿Qué tipo de cifrado utiliza una clave secreta para cifrar y descifrar datos?", "a": "Criptografía simétrica", "options": ["Criptografía asimétrica", "Criptografía de clave pública", "Criptografía simétrica", "Criptografía de hash"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "¿Cuál de las siguientes opciones es una función de mezcla o resumen utilizada en criptografía?", "a": "Función hash", "options": ["Firma electrónica", "Certificado digital", "Función hash", "Distribución de claves"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "¿Qué tecnología se basa en un conjunto de políticas y procedimientos para gestionar la seguridad de certificados digitales y claves públicas?", "a": "PKI", "options": ["SSL", "PKI", "DNI electrónico", "Algoritmos de cifrado"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "¿Cuál de las siguientes opciones describe una característica clave de la criptografía de clave pública (asimétrica)?", "a": "Requiere la distribución de claves públicas entre los usuarios.", "options": ["Utiliza la misma clave para cifrar y descifrar datos.", "Requiere la distribución de claves públicas entre los usuarios.", "Es más rápida y eficiente que la criptografía simétrica.", "Utiliza algoritmos de hash para asegurar la integridad de los datos."], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "Esta función es una técnica básica para garantizar la integridad de un mensaje, genera un código único que ante cualquier cambio se ve alterado.", "a": "hash", "options": ["sahs", "hash", "plash", "splas"], "correct": 1, "source": "Cuestionario. Tema 3"}, {"q": "Uno de los algoritmos de clave pública más presentes en la actualidad. El funcionamiento de este algoritmo se basa en qué el destinatario del mensaje genera una clave pública y otra privada, después el mensaje se cifra usando la clave pública:", "a": "RSA", "options": ["RBA", "DSS", "DSA", "RSA"], "correct": 3, "source": "Cuestionario. Tema 3"}, {"q": "Uno de los algoritmos más utilizados para la creación de funciones resumen y que permite generar un valor único de cada fichero que no podrá verse duplicado es:", "a": "md5", "options": ["md3", "md4", "md5", "md6"], "correct": 2, "source": "Cuestionario. Tema 3"}, {"q": "En Ubuntu para generar claves públicas y privadas se usa la herramienta gpg con la siguiente sintaxis:", "a": "gpg –en-key", "options": ["gpg –en-key", "gpg -k", "gpg -output", "gpg –import"], "correct": 0, "source": "Cuestionario. Tema 3"}, {"q": "En Ubuntu la sintaxis de uso para la encriptación simétrica es:", "a": "gpg –[cd  "Repaso 2ª Evaluación"}, {"q": "¿Cuál de las siguientes acciones forma parte de las políticas de bastionado y documentación en una organización?", "a": "Elaborar manuales de instalación y configuración segura", "options": ["Desactivar todos los mecanismos de auditoría", "Utilizar configuraciones distintas sin estandarizar", "Elaborar manuales de instalación y configuración segura", "Evitar la creación de políticas internas"], "correct": 2, "source": "Repaso 2ª Evaluación"}, {"q": "¿Qué tipo de hacker actúa sin permiso y puede revelar vulnerabilidades sin intención necesariamente maliciosa, aunque infringiendo la ley?", "a": "Grey hat", "options": ["White hat", "Black hat", "Grey hat", "Purple Team"], "correct": 2, "source": "Repaso 2ª Evaluación"}, {"q": "¿Cuál es una ventaja principal del uso de una VPN de LAN dentro de una organización?", "a": "Mejora la seguridad y la velocidad al aislar zonas de la red interna", "options": ["Permite el acceso anónimo a Internet", "Mejora la seguridad y la velocidad al aislar zonas de la red interna", "Sustituye completamente a los firewalls", "Elimina la necesidad de autenticación de usuarios"], "correct": 1, "source": "Repaso 2ª Evaluación"}, {"q": "¿Cuál de las siguientes prácticas sirve específicamente para cifrar todo el tráfico cuando se usa una red wifi pública?", "a": "Utilizar una VPN", "options": ["Mantener el firewall activado", "Utilizar una VPN", "Acceder únicamente a sitios web HTTPS", "Desactivar la conexión automática a redes conocidas"], "correct": 1, "source": "Repaso 2ª Evaluación"}, {"q": "¿Cuál de las siguientes medidas de configuración de un rúter ayuda directamente a evitar ataques de diccionario?", "a": "Cambiar la contraseña de acceso al rúter", "options": ["Modificar el nombre de la red wifi (SSID)", "Actualizar el firmware del rúter", "Cambiar la contraseña de acceso al rúter", "Utilizar cifrado WPA2/WPA3 en la red wifi"], "correct": 2, "source": "Repaso 2ª Evaluación"}];
const SOURCES = ["Cuestionario. Tema 1", "Cuestionario. Tema 2", "Cuestionario. Tema 3", "Cuestionario. Tema 4", "Cuestionario. Tema 5", "Cuestionario. Tema 6", "Cuestionario. Tema 7", "Cuestionario. Tema 8", "Cuestionario. Tema 9", "Cuestionario. Tema 10", "Cuestionario. Tema 11", "Cuestionario. Tema 12", "Cuestionario. Tema 13", "Cuestionario. Tema 14", "Cuestionario. Tema 15", "Repaso 2ª Evaluación"];

let sessionQs = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let wrongQs = [];
let selectedSources = new Set(SOURCES);
let mode = 'all';
let lastPool = [];

function buildSourcesGrid() {
  const grid = document.getElementById('sourcesGrid');
  grid.innerHTML = '';
  SOURCES.forEach(src => {
    const lbl = document.createElement('label');
    lbl.className = 'source-cb checked';
    lbl.innerHTML = `<input type="checkbox" checked onchange="toggleSource('${src}', this.checked)"> ${src}`;
    grid.appendChild(lbl);
  });
}

function toggleSource(src, checked) {
  if (checked) selectedSources.add(src); else selectedSources.delete(src);
  document.querySelectorAll('.source-cb').forEach(lbl => {
    const inp = lbl.querySelector('input');
    lbl.classList.toggle('checked', inp.checked);
  });
}

function toggleAll(state) {
  selectedSources = state ? new Set(SOURCES) : new Set();
  document.querySelectorAll('.source-cb input').forEach(inp => { inp.checked = state; inp.closest('.source-cb').classList.toggle('checked', state); });
}

function selectMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  mode = el.dataset.mode;
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz(pool) {
  if (!pool) {
    let filtered = ALL_QUESTIONS.filter(q => selectedSources.has(q.source));
    if (!filtered.length) { alert('Selecciona al menos una fuente'); return; }
    const n = parseInt(mode);
    if (!isNaN(n) && filtered.length > n) filtered = shuffle([...filtered]).slice(0, n);
    pool = filtered;
  }
  lastPool = pool;
  sessionQs = pool.map(q => {
    const paired = q.options.map((o,i) => ({text:o, isCorrect:i===q.correct}));
    const shuf = shuffle([...paired]);
    return {q:q.q, source:q.source, options:shuf.map(p=>p.text), correct:shuf.findIndex(p=>p.isCorrect), orig:q};
  });
  currentIdx = 0; correct = 0; wrong = 0; wrongQs = [];
  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  if (currentIdx >= sessionQs.length) { showResults(); return; }
  const q = sessionQs[currentIdx];
  answered = false;
  document.getElementById('questionNum').textContent = `Pregunta ${currentIdx+1} de ${sessionQs.length}`;
  document.getElementById('sourceTag').textContent = q.source;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('statCurrent').textContent = currentIdx+1;
  document.getElementById('statTotal').textContent = sessionQs.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('progressBar').style.width = (currentIdx/sessionQs.length*100)+'%';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;
  const div = document.getElementById('optionsDiv');
  div.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    div.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = sessionQs[currentIdx];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  const isCorrect = idx === q.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    opts[q.correct].classList.add('show-correct');
    wrong++;
    wrongQs.push(q.orig);
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').textContent = `✗ Incorrecto. Respuesta correcta: "${q.options[q.correct]}"`;
  } else {
    correct++;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').textContent = '✓ ¡Correcto!';
  }
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() { currentIdx++; renderQuestion(); }
function skipQuestion() { currentIdx++; renderQuestion(); }

function showResults() {
  show('resultsScreen');
  const total = sessionQs.length;
  const pct = Math.round(correct/total*100);
  const circle = document.getElementById('scoreCircle');
  circle.textContent = pct+'%';
  circle.className = 'score-circle ' + (pct>=80?'great':pct>=50?'good':'bad');
  document.getElementById('scoreLabel').textContent = pct>=80?'¡Excelente!':pct>=50?'Bien, sigue practicando':'Hay que repasar más';
  document.getElementById('scoreSub').textContent = `${correct} correctas / ${wrong} incorrectas / ${total-correct-wrong} sin responder · de ${total} preguntas`;
  const list = document.getElementById('reviewList');
  list.innerHTML = sessionQs.map((q,i) => {
    const userWrong = wrongQs.some(w => w.q===q.q);
    return `<div class="review-item ${userWrong?'fail':'ok'}">
      <div class="rq">${i+1}. ${q.q}</div>
      <div class="ra">✓ ${q.options[q.correct]}</div>
      ${userWrong?'<div class="rw">Tu respuesta fue incorrecta</div>':''}
    </div>`;
  }).join('');
}

function retryWrong() {
  if (!wrongQs.length) { alert('¡No tienes respuestas falladas!'); return; }
  startQuiz(wrongQs);
}

function toggleReview() {
  const list = document.getElementById('reviewList');
  list.classList.toggle('open');
}

function showStart() { show('startScreen'); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildSourcesGrid();
</script>
