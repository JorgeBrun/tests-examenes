<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Diseño de Interfaces Web</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1e4a8f;--blue-light:#2e6fd6;--green:#1a9e5c;--red:#d63031;
  --bg:#f0f4f8;--card:#fff;--border:#dde3ec;--text:#1a2332;--muted:#6b7b8d;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── SCREENS ── */
#screen-start,#screen-quiz,#screen-results{display:none;padding:24px}
#screen-start.active,#screen-quiz.active,#screen-results.active{display:block}

/* ── START SCREEN ── */
.start-hero{max-width:700px;margin:40px auto;text-align:center}
.start-hero h1{font-size:2rem;color:var(--blue);margin-bottom:8px}
.start-hero p{color:var(--muted);margin-bottom:32px}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px;text-align:left}
.filter-card{border:2px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.15s;background:var(--card)}
.filter-card:hover,.filter-card.selected{border-color:var(--blue-light);background:#eef3fd}
.filter-card input{margin-right:8px;accent-color:var(--blue)}
.filter-card .fc-title{font-weight:600;font-size:.9rem}
.filter-card .fc-count{color:var(--muted);font-size:.8rem}
.mode-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.mode-btn{padding:8px 20px;border:2px solid var(--border);border-radius:20px;cursor:pointer;font-size:.9rem;background:var(--card)}
.mode-btn.active{border-color:var(--blue);background:#eef3fd;color:var(--blue);font-weight:600}
.start-btn{background:var(--blue);color:#fff;border:none;padding:14px 40px;border-radius:10px;font-size:1.1rem;cursor:pointer;font-weight:600;transition:.15s}
.start-btn:hover{background:var(--blue-light)}

/* ── QUIZ SCREEN ── */
.quiz-wrap{max-width:720px;margin:0 auto}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.quiz-header h2{flex:1;font-size:1rem;color:var(--blue);font-weight:600}
#q-counter{color:var(--muted);font-size:.9rem;white-space:nowrap}
.progress-bar{height:6px;background:#dde3ec;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-light));border-radius:3px;transition:.3s}
.question-card{background:var(--card);border-radius:16px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:20px}
.source-tag{font-size:.75rem;color:var(--muted);margin-bottom:10px;font-style:italic}
.q-text{font-size:1.05rem;font-weight:600;line-height:1.5;margin-bottom:20px}
.options{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s;font-size:.97rem}
.opt:hover{border-color:var(--blue-light);background:#f5f8ff}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.opt.selected{border-color:var(--blue);background:#eef3fd}
.opt.selected .opt-letter{background:var(--blue);color:#fff}
.quiz-actions{display:flex;justify-content:space-between;align-items:center;gap:12px}
.q-skip{color:var(--muted);background:none;border:none;cursor:pointer;font-size:.88rem;text-decoration:underline}
.q-next{background:var(--blue);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:.97rem;cursor:pointer;font-weight:600;transition:.15s}
.q-next:disabled{opacity:.4;cursor:default}
.q-next:not(:disabled):hover{background:var(--blue-light)}

/* ── RESULTS SCREEN ── */
.results-wrap{max-width:720px;margin:0 auto}
.score-hero{text-align:center;padding:32px;background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:24px}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff}
.score-circle.great{background:linear-gradient(135deg,#00b894,#00cec9)}
.score-circle.good{background:linear-gradient(135deg,#fdcb6e,#e17055)}
.score-circle.bad{background:linear-gradient(135deg,var(--red),#fd79a8)}
.score-label{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.score-sub{color:var(--muted)}
.res-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.res-btn{padding:11px 22px;border-radius:8px;font-size:.95rem;cursor:pointer;font-weight:600;transition:.15s}
.res-btn.primary{background:var(--blue);color:#fff;border:none}
.res-btn.primary:hover{background:var(--blue-light)}
.res-btn.secondary{background:var(--card);color:var(--blue);border:2px solid var(--blue)}
.res-btn.secondary:hover{background:#eef3fd}
.res-btn.warning{background:#fff;color:var(--red);border:2px solid var(--red)}
.res-btn.warning:hover{background:#fff5f5}
.review-section{margin-top:8px}
.review-section h3{font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.review-item{background:var(--card);border-radius:12px;padding:16px 18px;margin-bottom:10px;border-left:4px solid var(--border)}
.review-item.wrong{border-left-color:var(--red)}
.review-item.right{border-left-color:var(--green)}
.ri-q{font-weight:600;margin-bottom:8px;font-size:.95rem}
.ri-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:3px;font-size:.88rem}
.ri-label{font-weight:700;min-width:90px;flex-shrink:0}
.ri-label.wrong{color:var(--red)}
.ri-label.correct{color:var(--green)}
.show-all-btn{background:none;border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;margin-bottom:16px;color:var(--muted)}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="active">
  <div class="start-hero">
    <h1>📚 Diseño de Interfaces Web</h1>
    <p>Elige las fuentes y el modo para tu sesión de estudio</p>

    <div class="filter-grid" id="filter-grid"></div>

    <div class="mode-row">
      <button class="mode-btn active" onclick="setMode('all',this)">Todas las preguntas</button>
      <button class="mode-btn" onclick="setMode('random20',this)">20 aleatorias</button>
      <button class="mode-btn" onclick="setMode('random40',this)">40 aleatorias</button>
    </div>

    <button class="start-btn" onclick="startQuiz()">▶ Empezar test</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz">
  <div class="quiz-wrap">
    <div class="quiz-header">
      <h2 id="q-source-label">Fuente</h2>
      <span id="q-counter">1 / 20</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-card">
      <div class="source-tag" id="q-source"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
    <div class="quiz-actions">
      <button class="q-skip" onclick="skipQuestion()">Saltar →</button>
      <button class="q-next" id="btn-next" disabled onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results">
  <div class="results-wrap">
    <div class="score-hero">
      <div class="score-circle" id="score-circle"></div>
      <div class="score-label" id="score-label"></div>
      <div class="score-sub" id="score-sub"></div>
    </div>
    <div class="res-actions">
      <button class="res-btn primary" onclick="showStart()">🏠 Inicio</button>
      <button class="res-btn secondary" onclick="replayQuiz()">🔄 Repetir mismo test</button>
      <button class="res-btn warning" id="btn-retry-wrong" onclick="retryWrong()">❌ Solo errores</button>
    </div>
    <div class="review-section">
      <button class="show-all-btn" onclick="toggleReview()">Mostrar/ocultar revisión completa</button>
      <div id="review-list"></div>
    </div>
  </div>
</div>

<script>
const ALL = [{"q": "¿Cuál o cuales de los siguientes elementos son convenientes añadir en cualquier diseño web?", "options": ["Cabecera", "Sistema de navegación", "Pie de página", "Todos son convenientes, aunque no obligatorios, en función del diseño del sitio"], "correct": 3, "source": "Canvas — 1ª Evaluación"}, {"q": "¿A través de qué etiqueta se modela una casilla de verificación en HTML?", "options": ["Checkbox", "Radio", "Verification", "Select"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Qué nombre recibe los elementos que pueden presentar varios estados en su funcionamiento y por lo tanto, cada uno de los estados podrá tener un estilo diferente como por ejemplo, los enlaces ?", "options": ["Pseudoclases", "CSS", "Pseudoelementos", "Framework"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Cuáles de los siguientes nombres corresponden a librerías de diseño para CSS?", "options": ["Bootstrap 4 y YUI", "Modelo de cajas y Bootstrap 4", "YUI y HTML", "Ninguna de las anteriores"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "La transformación de una imagen digital mediante la aplicación de operadores matemáticos es un:", "options": ["Giro", "Volteo", "Filtro", "Efecto"], "correct": 2, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Cuál de los siguientes códigos permite reproducir el audio de una página web de manera ininterrumpida hasta que el usuario abandone el sitio web?", "options": ["audio src=\"audio_fondo.mp3\" hidden", "audio src=\"audio_fondo.mp3\" autoplay", "audio src=\"audio_fondo.mp3\" controls autoplay", "audio src=\"audio_fondo.mp3\" loop"], "correct": 3, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Qué significa la licencia CC-BY-NC?", "options": ["Reconocimiento-No Comercial-Sin Obras Derivadas", "Reconocimiento-No Comercial", "No Comercial-Sin Obras Derivadas-Compartir bajo la misma licencia.", "Reconocimiento-Sin Obras Derivadas-Compartir bajo la misma licencia."], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Cómo se define un mixin en less?", "options": ["@nombreBloque{ propiedad_1: valor; ... propiedad_N: valorN; }", ".nombreBloque{ propiedad_1: valor; ... propiedad_N: valorN; }", "$nombreBloque{ propiedad_1: valor; ... propiedad_N: valorN; } \"", "@mixin nombreBloque { propiedad_1: valor; ... }"], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "Los selectores CSS basados en etiqueta indican ...", "options": ["El tipo de elemento sobre el que se va a aplicar.", "Los bloques que se identifican en el HTML.", "El atributo id de un bloque HTML.", "Las demás respuestas son incorrectas."], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "Los elementos comunes que encontramos en toda página web:", "options": ["zona de navegación, cabecera o header y cuerpo", "zona de navegación, cabecera, pie de página y cuerpo", "zona de creación, cabecera o pie de página", "zona de búsqueda, contenido y pie de página"], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "Sass es ...", "options": ["una herramienta multiplataforma escrita en python para el desarrollo de hojas de estilo estructuradas", "una herramienta multiplataforma escrita en Ruby para el desarrollo de hojas de estilo estructuradas", "un lenguaje de programación interpretado y orientado a objetos", "una herramienta linux para el desarrollo de hojas de estilo estructuradas"], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "El formato de audio MP3 es el más empleado para ..", "options": ["Sonido web de alta calidad, pero con archivos muy pesados.", "Audio con licencia pública GNU.", "La publicación de un sonido en un sitio web.", "Todas las respuestas son correctas."], "correct": 2, "source": "Canvas — 1ª Evaluación"}, {"q": "Las conocidas como páginas responsives", "options": ["se adaptan a las dimensiones de las pantallas", "adaptan su diseño al tipo de dispositivo y a las dimensiones de estos.", "cambian su diseño dependiendo de la aplicación que utilicen", "ofrecen resultados irregulares dependiendo del dispositivo utilizado"], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "la expresión div{padding:5px,20px;} ...", "options": ["Asigna el valor de 5px al relleno por encima y por debajo del área content y el valor de 20 px al área de content.", "Asigna el valor de 5px al relleno por encima y por debajo del área content y el valor de 20 px al relleno a la derecha y a la izquierda del content.", "Asigna el valor de 5px al relleno a la izquierda y a la derecha del área content y el valor de 20 px al relleno por encima y por debajo del content.", "Asigna el valor de 5px al relleno por encima y por debajo del área content y el valor de 20 px al borde a la derecha y a la izquierda del content."], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "La etiqueta", "options": ["El reproductor que abrirá el video.", "El instante de inicio y final de la reproducción.", "La duración del video.", "A y C ambas son correctas."], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "En Bootstrap es cierto que ...", "options": ["No es necesario crear un elemento de fila.", "Divide el contenido según un sistema de columnas.", "Las columnas disponibles en el sistema pueden variar entre 1 a 12.", "Una columna sólo puede tener un ancho de 1"], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "el diseño de logotipos debe ser", "options": ["claro, atractivo y fácil de recordar.", "moderno, claro y fácil de recordar.", "atractivo, sencillo y colorido", "de cualquier forma"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Qué etiqueta se utiliza para enlazar un archivo de hojas de estilo externas a un archivo HTML?", "options": ["", "", "", ""], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "La creación de enlaces indicando la ruta relativa o absoluta se realiza a través de la etiqueta:", "options": ["", "", "a", ""], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "Si un color se expresa de la forma #ffff00:", "options": ["El color rojo que participa en la combinación toma el valor 255 en decimal", "El color verde que participa en la combinación toma el valor 1111 0000 en binario", "El color azul que participa en la combinación toma el valor 255 en decimal", "Ninguna es correcta"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Qué pseudoelemento permite seleccionar la primera línea de texto de un elemento?", "options": ["::first-line", ":one-line", "#first-line", "Ninguna es correcta"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Cuál de las siguientes sintaxis es correcta?", "options": ["img src=\"ejemplo.png\"", "img src=\"ejemplo.png\" alt=\"Imagen de ejemplo\" title=\"Título de la imagen\"", "Ninguna es correcta, se utiliza la etiqueta a para la inserción de imágenes", "Las dos primeras opciones son correctas"], "correct": 3, "source": "Canvas — 1ª Evaluación"}, {"q": "El tamaño de una imagen se encuentra determinado por:", "options": ["La resolución de la imagen, la longitud, el ancho y la profundidad de color.", "La resolución de la imagen, la longitud y el ancho.", "La resolución de la imagen, la longitud, el ancho y el tipo de codificación del color.", "La resolución de la imagen, el número de píxeles y la profundidad de color."], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Cuál de las siguientes etiquetas crea un elemento interactivo como una nueva ventana?", "options": ["Details", "Summary", "Hidden", "Dialog"], "correct": 3, "source": "Canvas — 1ª Evaluación"}, {"q": "La resolución de una imagen es ...", "options": ["Su grado de detalle.", "El número de bits para definir un color.", "El algoritmo para reducir su tamaño.", "El número de colores que puede mostrar."], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Qué son las capas?", "options": ["Se trata de bloques de contenido que se sitúan dentro de una misma página y que permiten definir su comportamiento de forma dinámica.", "Partes de una misma página web", "consisten en ventanas independientes dentro de una misma página, y permiten organizar el contenido del sitio web", "elementos que permiten crear una apariencia más limpia y organizada de las páginas web"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "En el contexto de \"DIW\" (Diseño de Interfaz Web) o \"Diseño de Interfaz de Usuario\",¿Que es un framework?", "options": ["es un conjunto de herramientas, librerías, convenciones y buenas prácticas que pretenden encapsular las tareas repetitivas en módulos genéricos fácilmente reutilizables", "una herramienta que nos permite escribir pseudocódigo CSS", "es una herramienta que nos permite emular el modelo de cajas", "Es un entorno de trabajo para el desarrollo de paginas webs"], "correct": 0, "source": "Canvas — 1ª Evaluación"}, {"q": "Las propiedades y parámetros específicos de las imágenes son...", "options": ["saturación, tasa de compresión, resolución y profundidad del color.", "tamaño, saturación, resolución y profundidad", "tamaño, tasa de compresión, brillo y profundidad del color.", "tamaño, tasa de compresión, resolución y profundidad del color."], "correct": 3, "source": "Canvas — 1ª Evaluación"}, {"q": "Para poder reproducir un audio en un navegador es necesario ...", "options": ["Utilizar la etiqueta sound", "Instalar un complemento externo obligatoriamente", "Insertar el archivo de audio mediante", "Usar la etiqueta audio"], "correct": 3, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Cuál de las siguientes codificaciones no es color seguro?", "options": ["#66 33 FF", "#99 CC CC", "#CC C3 FF", "Todos son colores seguros"], "correct": 2, "source": "Canvas — 1ª Evaluación"}, {"q": "¿Para qué se utiliza la instrucción ?", "options": ["Añade imágenes al diseño web", "Añade enlaces al diseño web", "No existe", "Las dos primeras opciones son correctas"], "correct": 1, "source": "Canvas — 1ª Evaluación"}, {"q": "En las páginas con una estructura fija, las dimensiones se expresan uti Kahoot — Cuestionario DIW"}, {"q": "¿Qué es Sass?", "options": ["Una herramienta para editar imágenes.", "Una herramienta para compilar JavaScript.", "Una herramienta para desarrollar hojas de estilo estructuradas.", "Un framework de diseño web."], "correct": 2, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué se elimina en la sintaxis Sass que está presente en SCSS?", "options": ["El uso de puntos y coma.", "La indentación.", "Los comentarios.", "Los selectores."], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Por qué es importante organizar los ficheros SCSS en carpetas?", "options": ["Para que el código sea más accesible para los usuarios.", "Para optimizar el diseño y evitar la lentitud en la implementación.", "Para reducir el tamaño de los ficheros SCSS.", "Para que los archivos CSS sean más fáciles de leer."], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué etiqueta se usa en HTML para enlazar un archivo de estilo CSS generado desde SCSS?", "options": ["", "", "", ""], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué es un \"mixin\" en Sass?", "options": ["Un bloque de código reutilizable que agrupa propiedades de estilo comunes.", "Un tipo de selector utilizado para aplicar estilos.", "Un archivo donde se guardan variables y funciones.", "Una etiqueta HTML usada para vincular hojas de estilo."], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Cómo se define un mixin en Sass?", "options": ["Usando la etiqueta @include.", "Usando la etiqueta @mixin seguida del nombre del bloque.", "Usando la etiqueta @define.", "Usando la palabra clave mixin directamente."], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué factor determina el tamaño total de una imagen en el diseño web?", "options": ["La calidad de los píxeles.", "La resolución y la profundidad de color.", "La longitud, ancho, resolución y profundidad de color.", "El tipo de formato de la imagen."], "correct": 2, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué ocurre cuando la tasa de compresión de una imagen es demasiado alta?", "options": ["El tamaño de la imagen aumenta.", "La calidad de la imagen puede disminuir.", "La resolución mejora.", "La imagen se vuelve más detallada."], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué se requiere para usar imágenes o fotografías en un sitio web?", "options": ["Deben ser de elaboración propia o no estar sujetas a derechos de autor.", "Solo deben ser de elaboración propia.", "Pueden ser tomadas de cualquier fuente sin restricciones.", "Solo deben ser adquiridas por un precio adecuado."], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué caracteriza al formato MP3?", "options": ["Ideal para la transmisión en tiempo real sin descarga previa.", "Gran calidad de audio, pero con mayor tamaño de archivo.", "Licencia pública GNU y libre de código.", "Alta calidad y tamaño reducido, ideal para publicar en sitios web."], "correct": 3, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué elemento se utiliza para insertar audio en HTML5?", "options": ["", "", "", ""], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué atributo se utiliza para especificar el archivo de audio en la etiqueta ?", "options": ["type", "src", "srcfile", "file"], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué hace el atributo \"loop\" en la etiqueta ?", "options": ["Reproduce el audio una sola vez.", "Permite que el audio se repita en bucle.", "Oculta el reproductor de audio.", "Define el tamaño de los controles de audio."], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué formato de audio es soportado por todos los principales navegadores?", "options": ["MP3", "WAV", "OGG", "RA"], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué códec se utiliza comúnmente con el formato MP4 para la compresión de vídeo?", "options": ["VP8", "Theora", "H.264", "Vorbis"], "correct": 2, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Cómo se puede insertar un fragmento de vídeo comenzando desde un tiempo específico?", "options": ["Mediante el atributo autoplay.", "Utilizando el parámetro #t=tinicial.", "Con el atributo loop.", "Mediante el atributo controls."], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué formato de vídeo utiliza un códec de audio llamado Vorbis?", "options": ["MP4", "WebM", "MOV", "OGG"], "correct": 1, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Qué etiqueta HTML permite modificar el texto de un elemento ?", "options": ["", "", "", ""], "correct": 0, "source": "Kahoot — Cuestionario DIW"}, {"q": "¿Cuál es la función principal de la etiqueta  en HTML?", "options": ["Insertar un enlace interactivo.", "Crear una ventana emergente independiente.", "Modificar el contenido de la página.", "Insertar un video en bucle."], "correct": 1, "source": "Kahoot — Cuestionario DIW"}];
const SOURCES = [...new Set(ALL.map(q=>q.source))];

// ── state ──────────────────────────────────────────────────────────────────
let sessionQs = [];
let currentIdx = 0;
let userAnswers = []; // index of chosen option, or null if skipped
let selected = null;
let mode = 'all';
let activeFilters = new Set(SOURCES);
let reviewVisible = false;

// ── init ───────────────────────────────────────────────────────────────────
function buildFilterGrid() {
  const grid = document.getElementById('filter-grid');
  grid.innerHTML = '';
  SOURCES.forEach(src => {
    const count = ALL.filter(q=>q.source===src).length;
    const card = document.createElement('label');
    card.className = 'filter-card selected';
    card.innerHTML = `<input type="checkbox" checked onchange="toggleFilter('${src}',this)">
      <div><div class="fc-title">${src}</div><div class="fc-count">${count} preguntas</div></div>`;
    grid.appendChild(card);
  });
}
buildFilterGrid();

function toggleFilter(src, cb) {
  if(cb.checked) activeFilters.add(src); else activeFilters.delete(src);
  cb.closest('.filter-card').classList.toggle('selected', cb.checked);
}
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── quiz logic ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}; return a;
}
function startQuiz() {
  let pool = ALL.filter(q=>activeFilters.has(q.source));
  if(pool.length===0){alert('Selecciona al menos una fuente.');return;}
  pool = shuffle(pool);
  if(mode==='random20') pool=pool.slice(0,Math.min(20,pool.length));
  else if(mode==='random40') pool=pool.slice(0,Math.min(40,pool.length));
  sessionQs = pool.map(q=>{
    // shuffle options but track correct index
    const paired = q.options.map((o,i)=>{return{text:o,isCorrect:i===q.correct}});
    const shuffled = shuffle(paired);
    return {q:q.q, source:q.source, options:shuffled.map(p=>p.text), correct:shuffled.findIndex(p=>p.isCorrect)};
  });
  currentIdx = 0;
  userAnswers = new Array(sessionQs.length).fill(null);
  selected = null;
  showScreen('screen-quiz');
  renderQuestion();
}
function renderQuestion() {
  const q = sessionQs[currentIdx];
  document.getElementById('q-source').textContent = q.source;
  document.getElementById('q-source-label').textContent = '📖 ' + q.source;
  document.getElementById('q-counter').textContent = (currentIdx+1)+' / '+sessionQs.length;
  document.getElementById('progress-fill').style.width = ((currentIdx/sessionQs.length)*100)+'%';
  document.getElementById('q-text').textContent = q.q;
  const prev = userAnswers[currentIdx];
  selected = prev;
  const letters = ['A','B','C','D'];
  document.getElementById('q-options').innerHTML = q.options.map((o,i)=>`
    <div class="opt${prev===i?' selected':''}" onclick="selectOpt(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <span>${o}</span>
    </div>`).join('');
  document.getElementById('btn-next').disabled = (selected===null && prev===null);
}
function selectOpt(i) {
  selected = i;
  userAnswers[currentIdx] = i;
  document.querySelectorAll('.opt').forEach((el,j)=>el.classList.toggle('selected',j===i));
  document.getElementById('btn-next').disabled = false;
}
function nextQuestion() {
  if(currentIdx<sessionQs.length-1){currentIdx++;selected=null;renderQuestion();}
  else showResults();
}
function skipQuestion() {
  userAnswers[currentIdx] = null;
  selected = null;
  if(currentIdx<sessionQs.length-1){currentIdx++;renderQuestion();}
  else showResults();
}

// ── results ────────────────────────────────────────────────────────────────
function showResults() {
  showScreen('screen-results');
  const total = sessionQs.length;
  const correct = sessionQs.filter((q,i)=>userAnswers[i]===q.correct).length;
  const pct = Math.round((correct/total)*100);
  const circle = document.getElementById('score-circle');
  circle.textContent = pct+'%';
  circle.className = 'score-circle '+(pct>=80?'great':pct>=50?'good':'bad');
  document.getElementById('score-label').textContent = correct+' correctas de '+total;
  document.getElementById('score-sub').textContent = pct>=80?'¡Excelente trabajo! 🎉':pct>=50?'Bien, sigue practicando 💪':'Necesitas repasar más 📖';
  const wrongCount = sessionQs.filter((q,i)=>userAnswers[i]!==q.correct).length;
  document.getElementById('btn-retry-wrong').style.display = wrongCount>0?'':'none';

  reviewVisible = false;
  document.getElementById('review-list').style.display = 'none';
  renderReview();
}
function renderReview() {
  const letters = ['A','B','C','D'];
  document.getElementById('review-list').innerHTML = sessionQs.map((q,i)=>{
    const ua = userAnswers[i];
    const isRight = ua===q.correct;
    const wasSkipped = ua===null;
    return `<div class="review-item ${isRight?'right':'wrong'}">
      <div class="ri-q">${i+1}. ${q.q}</div>
      ${!isRight && !wasSkipped?`<div class="ri-row"><span class="ri-label wrong">❌ Tu respuesta:</span><span>${q.options[ua]}</span></div>`:''}
      ${wasSkipped?`<div class="ri-row"><span class="ri-label wrong">⏭ Saltada</span></div>`:''}
      <div class="ri-row"><span class="ri-label correct">✓ Correcta:</span><span>${q.options[q.correct]}</span></div>
    </div>`;
  }).join('');
}
function toggleReview() {
  reviewVisible = !reviewVisible;
  document.getElementById('review-list').style.display = reviewVisible?'block':'none';
}
function replayQuiz() {
  currentIdx = 0;
  userAnswers = new Array(sessionQs.length).fill(null);
  selected = null;
  showScreen('screen-quiz');
  renderQuestion();
}
function retryWrong() {
  const wrong = sessionQs.filter((q,i)=>userAnswers[i]!==q.correct);
  if(wrong.length===0)return;
  sessionQs = shuffle(wrong);
  currentIdx = 0;
  userAnswers = new Array(sessionQs.length).fill(null);
  selected = null;
  showScreen('screen-quiz');
  renderQuestion();
}
function showStart() {
  showScreen('screen-start');
}
function showScreen(id) {
  ['screen-start','screen-quiz','screen-results'].forEach(s=>{
    document.getElementById(s).classList.toggle('active',s===id);
  });
  window.scrollTo(0,0);
}
</script>
